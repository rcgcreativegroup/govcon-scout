<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GovCon Scout Operator Dashboard</title>
  <style>
    :root {
      --page: #0e0e10;
      --card: #141416;
      --top: #141416;
      --filter: #111114;
      --queue: #0c0c0e;
      --input: #1a1a1e;
      --border: #2a2a2e;
      --text: #e0e0e0;
      --secondary: #888888;
      --muted: #555555;
      --green: #00ff88;
      --go-bg: #1a2e1a;
      --amber: #f0a500;
      --amber-bg: #2a1f0a;
      --red: #ff4444;
      --cyan: #4499ff;
      --purple: #9966ff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--page);
      color: var(--text);
      font-family: "Courier New", monospace;
      font-size: 11px;
    }
    button, input, select, textarea {
      font-family: "Courier New", monospace;
      border-radius: 0;
    }
    button {
      background: var(--input);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 7px 9px;
      cursor: pointer;
      font-size: 11px;
    }
    button:hover { border-color: var(--green); color: var(--green); }
    button.go { background: var(--go-bg); color: var(--green); border-color: var(--green); }
    button.warn { background: var(--amber-bg); color: var(--amber); border-color: var(--amber); }
    button.risk { background: #2a1010; color: var(--red); border-color: var(--red); }
    input, select, textarea {
      background: var(--input);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 7px;
      width: 100%;
      font-size: 11px;
    }
    textarea { min-height: 72px; resize: vertical; }
    a { color: var(--cyan); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .topbar {
      height: 54px;
      display: grid;
      grid-template-columns: 290px 1fr 360px;
      gap: 14px;
      align-items: center;
      padding: 9px 12px;
      background: var(--top);
      border-bottom: 1px solid var(--border);
    }
    .brand { color: var(--green); font-size: 14px; font-weight: bold; }
    .counts { color: var(--secondary); display: flex; gap: 14px; flex-wrap: wrap; }
    .counts b { color: var(--text); }
    .search-wrap { display: grid; grid-template-columns: 1fr 70px 120px; gap: 6px; }
    .workspace-top-btn {
      border: 1px solid #9966ff;
      color: #9966ff;
      background: transparent;
      font: 11px "Courier New", monospace;
      padding: 7px;
      cursor: pointer;
      white-space: nowrap;
    }
    .filterbar {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 8px 12px;
      background: var(--filter);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .filterbar button.active { color: var(--green); border-color: var(--green); background: var(--go-bg); }
    .sort-wrap {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 230px;
      color: var(--secondary);
    }
    .sort-wrap select { width: 145px; }
    .tab-count { color: var(--secondary); }
    .review-ineligible {
      background: var(--amber-bg);
      color: var(--amber);
      border-color: var(--amber);
      font-size: 11px;
      white-space: nowrap;
    }
    .archive-pastdue {
      background: transparent;
      color: #cc4444;
      border-color: #cc4444;
      font-size: 11px;
      white-space: nowrap;
    }
    .workflow {
      color: var(--secondary);
      border-bottom: 1px solid #1e1e22;
      box-sizing: border-box;
      height: 29px;
      padding: 5px 12px;
      background: #0a0a0c;
      white-space: nowrap;
      overflow: visible;
      position: relative;
      z-index: 20;
    }
    .workflow-ribbon {
      display: flex;
      gap: 4px;
      align-items: center;
      height: 100%;
      white-space: nowrap;
      overflow: hidden;
    }
    .workflow-stage {
      font: 10px "Courier New", monospace;
      padding: 2px 8px;
      border-radius: 2px;
      border: 1px solid #222222;
      color: #2a2a2e;
      background: transparent;
      cursor: pointer;
      line-height: 10px;
    }
    .workflow-stage.current {
      border-color: #00ff88;
      color: #00ff88;
      background: #0a1a0a;
      cursor: default;
    }
    .workflow-stage.done {
      border-color: #444444;
      color: #555555;
      background: transparent;
    }
    .workflow-stage.future {
      border-color: #222222;
      color: #2a2a2e;
      background: transparent;
    }
    .workflow-stage-confirm {
      position: absolute;
      top: calc(100% + 2px);
      left: var(--confirm-left, 12px);
      color: #f0a500;
      background: #0a0a0c;
      border: 1px solid #2a2a2e;
      padding: 4px 6px;
      font: 11px "Courier New", monospace;
      z-index: 30;
    }
    .workflow-stage-confirm button {
      font-size: 10px;
      padding: 2px 7px;
      margin-left: 5px;
    }
    .main {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: calc(100vh - 92px);
    }
    .queue {
      background: var(--queue);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      max-height: calc(100vh - 92px);
    }
    .queue-empty { color: var(--muted); padding: 12px; font: 11px "Courier New", monospace; }
    .queue-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px 5px; border-bottom: 1px solid #1b1b1f;
      background: #0c0c0e; flex-shrink: 0;
    }
    .queue-header-label {
      font: bold 9px "Courier New", monospace;
      text-transform: uppercase; letter-spacing: .08em; color: #555;
    }
    .queue-header-count { font: 9px "Courier New", monospace; color: #444; }
    .queue-header-count .qi-pos { color: #888; }
    .queue-item {
      padding: 7px 10px;
      border-bottom: 1px solid #0e0e10;
      border-left: 2px solid transparent;
      background: #0c0c0e;
      cursor: pointer;
      display: flex; flex-direction: column; gap: 3px;
    }
    .queue-item:hover:not(.active) { background: #0e0e10; }
    .queue-item.active { border-left-color: #00ff88; background: #0a150a; }
    .qi-line1 { display: flex; align-items: flex-start; gap: 5px; min-width: 0; }
    .qi-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
    }
    .qi-title {
      font: 10px "Courier New", monospace; color: #999;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1;
    }
    .queue-item.active .qi-title { color: #fff; }
    .qi-meta {
      margin-left: 12px; font: 9px "Courier New", monospace;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .qi-lane { color: #555; }
    .qi-sep { color: #333; }
    .qi-elig { color: #555; }
    .qi-due-ok { color: #444; }
    .qi-due-amber { color: #f0a500; }
    .qi-due-red { color: #ff4444; }
    .qi-badges { margin-left: 12px; display: flex; gap: 3px; flex-wrap: nowrap; }
    .qi-badge {
      font: 8px "Courier New", monospace; padding: 1px 4px;
      border-radius: 2px; border: 1px solid; white-space: nowrap;
    }
    .qi-badge.purple { border-color: #9966ff55; color: #9966ff; background: #0d0a1a; }
    .qi-badge.green  { border-color: #00ff8855; color: #00ff88; background: #041a0a; }
    .qi-badge.amber  { border-color: #f0a50055; color: #f0a500; background: #1a1200; }
    .qi-badge.cyan   { border-color: #4499ff55; color: #4499ff; background: #041020; }
    .qi-badge.red    { border-color: #ff444455; color: #ff4444; background: #1a0505; }
    .qi-badge.gray   { border-color: #33333355; color: #444; background: #0a0a0c; }
    .tag { border: 1px solid var(--border); padding: 1px 4px; color: var(--secondary); }
    .tag.high { color: var(--green); border-color: var(--green); }
    .tag.med { color: var(--amber); border-color: var(--amber); }
    .tag.low { color: var(--red); border-color: var(--red); }
    .eligibility-dot {
      width: 8px;
      height: 8px;
      display: inline-block;
      border-radius: 50%;
      border: 1px solid var(--border);
      margin-right: 2px;
    }
    .eligibility-dot.eligible_now { background: var(--green); border-color: var(--green); }
    .eligibility-dot.unrestricted { background: var(--secondary); border-color: var(--secondary); }
    .eligibility-dot.watch_list { background: var(--amber); border-color: var(--amber); }
    .eligibility-dot.ineligible_now { background: var(--red); border-color: var(--red); }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9000;
    }
    .modal {
      width: min(560px, calc(100vw - 28px));
      border: 1px solid var(--amber);
      background: var(--card);
      padding: 14px;
      color: var(--text);
      box-shadow: 0 0 0 1px #000;
    }
    .modal h2 {
      color: var(--amber);
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin: 0 0 12px;
    }
    .modal pre {
      white-space: pre-wrap;
      color: var(--secondary);
      border: 1px solid var(--border);
      background: #101012;
      padding: 8px;
      max-height: 300px;
      overflow-y: auto;
    }
    .setaside-badge {
      display: inline-block;
      border: 1px solid var(--border);
      padding: 3px 6px;
      color: var(--secondary);
      background: #101012;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.3;
    }
    .setaside-badge.eligible {
      color: var(--green);
      border-color: var(--green);
      background: var(--go-bg);
    }
    .setaside-badge.caution {
      color: var(--amber);
      border-color: var(--amber);
      background: var(--amber-bg);
    }
    .setaside-badge.neutral {
      color: var(--secondary);
      border-color: var(--border);
    }
    .readiness-badge {
      display: inline-block;
      border: 1px solid var(--border);
      padding: 3px 6px;
      background: #101012;
      color: var(--secondary);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.3;
    }
    .readiness-badge.green {
      color: var(--green);
      border-color: var(--green);
      background: var(--go-bg);
    }
    .readiness-badge.cyan {
      color: var(--cyan);
      border-color: var(--cyan);
      background: #101b24;
    }
    .readiness-badge.amber {
      color: var(--amber);
      border-color: var(--amber);
      background: var(--amber-bg);
    }
    .readiness-badge.muted {
      color: var(--secondary);
      border-color: var(--border);
      background: #101012;
    }
    .readiness-helper {
      margin-top: 5px;
      color: var(--secondary);
      font-size: 11px;
      line-height: 1.35;
    }
    .copy-tools {
      margin-top: 9px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--secondary);
    }
    .card {
      background: var(--card);
      padding: 14px;
      overflow-y: auto;
      max-height: calc(100vh - 92px);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }
    .title { font-size: 14px; color: var(--text); line-height: 1.4; }
    .subtle { color: var(--secondary); }
    .muted { color: var(--muted); }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 8px;
      margin: 12px 0;
    }
    .meta {
      border: 1px solid var(--border);
      background: #111114;
      padding: 7px;
      min-height: 48px;
    }
    .label {
      display: block;
      color: #8fbcd4;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .value {
      color: #e8e8e8;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .section {
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .section h3 {
      margin: 0 0 8px;
      color: #b7d7e8;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .boxed-section {
      background: #141416;
      border: 1px solid #1e1e22;
      padding: 10px 12px;
    }
    .ai-summary-text {
      color: #7ec8a4;
      font-size: 11px;
      line-height: 1.6;
    }
    .next-action-box div {
      color: #f0a500;
      font-size: 12px;
      line-height: 1.5;
    }
    .intelligence-grid {
      gap: 1px;
      background: #1e1e22;
    }
    .requirements-text {
      color: #aaaaaa;
      font-size: 11px;
      line-height: 1.5;
    }
    .disqualifiers-text {
      color: #cc7070;
      font-size: 11px;
      line-height: 1.5;
    }
    .ribbon { display: flex; gap: 5px; flex-wrap: wrap; margin: 10px 0 4px; }
    .stage {
      padding: 5px 7px;
      min-width: 82px;
      text-align: center;
      border: 1px solid #2a2a2e;
      background: transparent;
      color: #333333;
      cursor: pointer;
    }
    .stage.current { color: #00ff88; border-color: #00ff88; background: #0a1a0a; cursor: default; }
    .stage.done { color: #666666; border-color: #444444; background: transparent; }
    .stage.future { color: #333333; border-color: #2a2a2e; background: transparent; }
    .stage-confirm {
      color: #f0a500;
      font: 11px "Courier New", monospace;
      margin: 2px 0 10px;
    }
    .stage-confirm button {
      font-size: 11px;
      padding: 3px 8px;
      margin-left: 5px;
    }
    .countdown.ok { color: var(--secondary); }
    .countdown.warn { color: var(--amber); }
    .countdown.danger { color: var(--red); }
    .disq {
      border: 1px solid var(--border);
      padding: 8px;
      margin-top: 10px;
    }
    .disq.HARD { border-color: var(--red); color: var(--red); background: #211010; }
    .disq.SOFT { border-color: var(--amber); color: var(--amber); background: var(--amber-bg); }
    .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .actions { display: flex; flex-wrap: wrap; gap: 7px; }
    .links { display: flex; flex-wrap: wrap; gap: 8px; }
    .checklist {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 6px;
    }
    .check {
      border: 1px solid var(--border);
      padding: 6px;
      color: var(--secondary);
    }
    .check.detected { color: var(--green); border-color: #25583d; }
    .upload-zone {
      border: 1px dashed var(--amber);
      background: var(--amber-bg);
      padding: 10px;
    }
    .note-row {
      border-top: 1px solid var(--border);
      padding: 7px 0;
    }
    .note-meta { color: var(--secondary); font-size: 10px; margin-bottom: 3px; }
    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
    .keyboard-legend {
      margin-top: 10px;
      color: #555555;
      font: 10px "Courier New", monospace;
      text-align: center;
    }
    .status-line {
      color: var(--secondary);
      min-height: 18px;
      margin-top: 8px;
    }
    .action-result {
      border: 1px solid;
      padding: 9px;
      font: 11px "Courier New", monospace;
      line-height: 1.45;
    }
    .action-result.success {
      border-color: var(--green);
      background: #0a1a0a;
      color: var(--green);
    }
    .action-result.error {
      border-color: var(--red);
      background: #1a0a0a;
      color: var(--red);
    }
    .action-result-title {
      font-weight: 700;
      margin-bottom: 4px;
    }
    .action-result-detail {
      color: var(--secondary);
      margin-top: 4px;
    }
    .action-result-updated {
      color: var(--cyan);
      font-size: 10px;
      margin-top: 4px;
    }
    .source-row {
      margin-top: 7px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--secondary);
    }
    .source-row .label {
      display: inline;
      margin: 0;
    }
    .source-row a {
      border: 1px solid var(--border);
      padding: 4px 7px;
      color: var(--cyan);
      background: #101012;
    }
    .triage-hero {
      margin: 0 0 12px;
      background: #1e1e22;
      display: grid;
      gap: 1px;
      border-bottom: 1px solid #1e1e22;
    }
    .urgency-line {
      font: bold 12px "Courier New", monospace;
      margin: 0;
      padding: 8px 14px;
      border-bottom: 1px solid #1e1e22;
    }
    .urgency-line.danger { color: var(--red); background: #1a0505; }
    .urgency-line.warn { color: var(--amber); background: #1a1200; }
    .urgency-line.good { color: var(--green); background: #051a0e; }
    .urgency-line.muted { color: var(--secondary); background: #0e0e10; }
    .hero-label {
      color: #8fbcd4;
      font: 700 9px "Courier New", monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .triage-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #1e1e22;
    }
    .triage-box {
      background: #141416;
      padding: 10px 12px;
      min-height: 62px;
    }
    .triage-value {
      color: #e0e0e0;
      font: 12px "Courier New", monospace;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }
    .triage-value.muted { color: #888888; }
    .description-box {
      background: #0e1a0e;
      padding: 10px 14px;
      border-bottom: 1px solid #1e1e22;
    }
    .description-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 7px;
    }
    .shortcut-hint {
      color: #555555;
      font: 10px "Courier New", monospace;
    }
    .triage-box .checklist {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px;
      margin-top: 4px;
    }
    .triage-box .check {
      padding: 4px 5px;
      font-size: 10px;
      min-height: 0;
    }
    .triage-box .check .label {
      font-size: 9px;
      margin-bottom: 2px;
    }
    .triage-box .upload-zone {
      margin-top: 8px;
      padding: 8px;
    }
    .buyer-lines {
      display: grid;
      gap: 5px;
      color: #e0e0e0;
      font: 11px "Courier New", monospace;
      line-height: 1.35;
    }
    .buyer-lines .email { color: var(--cyan); }
    .status-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin: 8px 0;
    }
    .status-badge {
      font: 10px "Courier New", monospace;
      padding: 3px 8px;
      border-radius: 3px;
      border: 1px solid;
      background: transparent;
    }
    .status-badge.green { color: var(--green); border-color: var(--green); }
    .status-badge.gray { color: #888888; border-color: #555555; }
    .status-badge.amber { color: var(--amber); border-color: var(--amber); }
    .status-badge.red { color: var(--red); border-color: var(--red); }
    .status-badge.cyan { color: var(--cyan); border-color: var(--cyan); }
    .setaside-fact {
      margin: 8px 0 10px;
    }
    .setaside-raw {
      color: #555555;
      font: 10px "Courier New", monospace;
      margin-top: 5px;
    }
    .analysis-marker {
      background: #0a0a0c;
      border: 1px solid #1e1e22;
      color: var(--green);
      font: 10px "Courier New", monospace;
      padding: 6px 14px;
      margin: 10px 0;
      text-transform: uppercase;
    }
    .analysis-marker.pending {
      background: #0a0a0c;
      color: #555555;
      padding: 12px 14px;
      text-transform: none;
    }
    .analysis-marker .workspace-inline {
      border: 1px solid var(--purple);
      color: var(--purple);
      background: transparent;
      font: 11px "Courier New", monospace;
      padding: 5px 12px;
      margin-top: 8px;
      cursor: pointer;
    }
    .details-block {
      background: #0a0a0c;
      border: 1px solid #1e1e22;
      padding: 8px 12px;
    }
    .details-block summary {
      color: #8fbcd4;
      cursor: pointer;
      font: 700 10px "Courier New", monospace;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .details-block summary span { color: var(--cyan); font-weight: 400; letter-spacing: 0; margin-left: 6px; }
    .details-grid {
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: 6px 10px;
      margin-top: 10px;
      font: 11px "Courier New", monospace;
    }
    .details-grid .detail-label { color: #8fbcd4; text-transform: uppercase; }
    .details-grid .detail-value { color: #e0e0e0; overflow-wrap: anywhere; }
    .desc-preview {
      color: #e8e8e8;
      font: 12px "Courier New", monospace;

<body>
  <div class="topbar" id="top-bar">
    <div>
      <div class="brand">GOVCON SCOUT // BID DESK</div>
      <div class="subtle" id="position">loading queue</div>
    </div>
    <div class="counts" id="counts"></div>
    <div class="search-wrap">
      <input id="search" placeholder="search notice, title, agency, notes...">
      <button id="resetSearch">RESET</button>
      <button id="openWorkspacesBtn" class="workspace-top-btn">⬡ Workspaces</button>
    </div>
  </div>
  <div id="sticky-context-bar">
    <div id="sticky-left">
      <span id="sticky-stage-label">CURRENT STAGE</span>
      <span id="sticky-stage-name">—</span>
    </div>
    <div id="sticky-actions"></div>
  </div>
  <div class="filterbar" id="filters"></div>
  <div class="workflow" id="workflowRibbon"></div>
  <div class="main">
    <aside class="queue" id="queue"></aside>
    <main class="card" id="card"></main>
  </div>

  <script>
    const FILTERS = ["Active", "Watch List", "Move Forward", "Manual Review", "Needs Docs", "AI Reviewed", "Sources Sought", "Flagged", "Workspaces", "All", "Archive"];
    const FULL_STAGE = { Ready: "Ready to Submit" };
    const ACTIVE_STAGES = ["Triage", "Intake", "Manual Review", "AI Review", "Development", "Ready to Submit", "Execution"];
    const STAGE_ORDER = ["Triage", "Intake", "Manual Review", "AI Review", "Development", "Ready to Submit", "Execution", "Archive", "Done"];
    const ARCHIVE_TERMS = ["pass", "ignore", "poor fit", "duplicate", "already covered", "archive", "parked"];
    const UEI = "QJZTCE6MKBG5";
    const BUTTONS = {
      "Triage": ["YES — Intake Docs", "Move Forward", "Manual Review", "PASS"],
      "Intake": ["Prepare SAM Docs", "Manual Upload", "Bypass to AI Review", "PASS"],
      "Manual Review": ["Advance to AI Review", "Advance to Development", "PASS"],
      "AI Review": ["Run AI Review", "Flag Disqualifier", "Advance to Development"],
      "Development": ["Log Vendor Quote", "Draft Response", "Mark Ready to Submit", "PASS"],
      "Ready to Submit": ["Mark Submitted", "Send Back to Development"],
      "Execution": ["Log Follow-Up", "Mark Done", "Park"],
      "Archive": ["Reactivate"],
      "Done": ["Reactivate"]
    };

    let opportunities = [];
    let config = {};
    let activeIndex = 0;
    let activeFilter = "Active";
    let sortMode = "Priority";
    let searchTerm = "";
    let statusMessage = "";
    let actionResult = null;
    let workspaceSessions = [];
    let pendingStageOverride = "";
    let pendingWorkflowStageOverride = "";
    let workflowStageConfirmLeft = 12;
    const postAiStatusCache = new Map();
    const postAiStatusPending = new Set();
    const autoSynopsisAttemptedNoticeIds = new Set();
    let autoSynopsisTimer = null;

    const h = value => String(value ?? "").replace(/[&<>"']/g, ch => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[ch]));
    const val = value => h(value || "not available");
    const currentStage = row => row.macro_stage || "Triage";
    const noticeId = row => row.notice_id || "MyBidMatch";
    const stageFilterValue = f => FULL_STAGE[f] || f;
    const textOf = value => String(value || "").toLowerCase();
    const hasMeaningful = value => {
      const text = String(value || "").trim().toLowerCase();
      return !!text && !["not available", "none", "null", "n/a", "na"].includes(text);
    };
    const isFlagged = row => ["true", "yes", "y", "1", "flagged"].includes(textOf(row.flagged).trim());
    const isWatched = row => ["true", "yes", "y", "1"].includes(textOf(row.watch_list).trim());
    const containsAny = (value, terms) => terms.some(term => textOf(value).includes(term));
    const setAsideText = row => [row.set_aside, row.set_aside_type, row.set_aside_description].filter(hasMeaningful).join(" ");
    const setAsideEligibility = row => {
      const text = textOf(setAsideText(row));
      if (!text) return {
        bucket: "unrestricted",
        label: "unrestricted/unknown",
        tooltip: "Unrestricted or unknown"
      };
      if (text.includes("edwosb") || text.includes("economically disadvantaged woman-owned")) {
        return { bucket: "ineligible_now", label: "EDWOSB", tooltip: "Not currently prime eligible" };
      }
      if (text.includes("wosb") || text.includes("woman-owned") || text.includes("woman owned")) {
        return { bucket: "ineligible_now", label: "WOSB", tooltip: "Not currently prime eligible" };
      }
      if (text.includes("hubzone")) {
        return { bucket: "ineligible_now", label: "HUBZone", tooltip: "Not currently prime eligible" };
      }
      if (text.includes("8(a)") || /\b8a\b/.test(text)) {
        return { bucket: "ineligible_now", label: "8(a)", tooltip: "Not currently prime eligible" };
      }
      if (text.includes("sdvosb") || text.includes("service-disabled veteran-owned") || text.includes("service disabled veteran owned")) {
        return { bucket: "watch_list", label: "SDVOSB", tooltip: "Veteran set-aside — future certification path" };
      }
      if (text.includes("unrestricted") || text.includes("full and open")) {
        return { bucket: "unrestricted", label: "unrestricted", tooltip: "Unrestricted or unknown" };
      }
      if (text.includes("total small business") || text.includes("small business set-aside") || text === "sba" || (text.includes("small business") && !text.includes("woman") && !text.includes("veteran") && !text.includes("hubzone"))) {
        return { bucket: "eligible_now", label: "small business", tooltip: "Eligible/current pursuit set-aside" };
      }
      return { bucket: "unrestricted", label: "unrestricted/unknown", tooltip: "Unrestricted or unknown" };
    };
    const isArchivedStatus = row => {
      if (["Archive", "Done"].includes(currentStage(row))) return true;
      return containsAny(row.operator_status, ARCHIVE_TERMS)
        || containsAny(row.triage_status, ARCHIVE_TERMS)
        || containsAny(row.current_stage, ARCHIVE_TERMS);
    };
    const hasNoticeId = row => hasMeaningful(row.notice_id);
    const activeReview = row => {
      if (isFlagged(row)) return false;
      if (!hasNoticeId(row)) return false;
      if (isArchivedStatus(row)) return false;
      if (setAsideEligibility(row).bucket === "ineligible_now") return false;
      return ACTIVE_STAGES.includes(currentStage(row));
    };
    const notArchivedUnlessFlagged = row => isFlagged(row) || (!isArchivedStatus(row) && hasNoticeId(row));

    async function api(path, options = {}) {
      const response = await fetch(path, options);
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    async function load() {
      config = await api("/api/config");
      const data = await api("/api/opportunities");
      opportunities = data.opportunities || [];
      await refreshWorkspaceSessions(false);
      renderFilters();
      render();
      requestAnimationFrame(adjustLayout);
    }

    async function refreshWorkspaceSessions(updateUi = true) {
      try {
        const data = await api("/api/workspace-sessions");
        workspaceSessions = data.sessions || [];
      } catch {
        workspaceSessions = [];
      }
      if (updateUi) {
        renderFilters();
        renderQueue(filteredItems());
      }
    }

    function workspaceSessionIds() {
      return new Set(workspaceSessions.map(session => typeof session === "string" ? session : session.notice_id));
    }

    function searchableText(row) {
      const notes = (row.notes || []).map(n => n.note_text).join(" ");
      const readiness = row.data_readiness || {};
      return [
        row.notice_id, row.title, row.agency, row.source, row.lane, row.naics,
        row.set_aside, row.watch_list, readiness.value, readiness.tag, readiness.helper,
        row.macro_stage, row.current_stage, row.operator_status, row.triage_status,
        row.recommended_next_action, row.description, notes
      ].join(" ").toLowerCase();
    }

    function filterPredicate(name) {
      return row => {
        const ready = textOf(readiness(row).value);
        const sourceAvailable = !!sourceUrl(row);
        if (name === "All") return true;
        if (name === "Active") return activeReview(row);
        if (name === "Watch List") return isWatched(row);
        if (name === "Move Forward") {
          if (!notArchivedUnlessFlagged(row)) return false;
          return textOf(row.operator_status).includes("move_forward");
        }
        if (name === "Manual Review") {
          if (!notArchivedUnlessFlagged(row)) return false;
          return currentStage(row) === "Manual Review"
            || textOf(row.operator_status).includes("manual_review");
        }
        if (name === "Flagged") return isFlagged(row);
        if (name === "Workspaces") return workspaceSessionIds().has(row.notice_id);
        if (name === "Archive") return isArchivedStatus(row);
        if (name === "Needs Docs") {
          if (!notArchivedUnlessFlagged(row)) return false;
          return currentStage(row) === "Intake"
            || containsAny(row.operator_status, ["documents needed"])
            || containsAny(row.current_stage, ["documents needed"])
            || ready.includes("documents needed")
            || (ready.includes("metadata only") && sourceAvailable);
        }
        if (name === "AI Reviewed") {
          if (!notArchivedUnlessFlagged(row)) return false;
          return ready.includes("ai reviewed") || hasMeaningful(row.ai_summary) || hasMeaningful(row.requirements);
        }
        if (name === "Sources Sought") {
          if (!notArchivedUnlessFlagged(row)) return false;
          return containsAny(row.notice_type, ["sources sought", "rfi", "sources_sought"])
            || containsAny(row.solicitation_type, ["sources sought", "rfi", "sources_sought"])
            || hasMeaningful(row.sources_sought_status)
            || ready.includes("response plan ready");
        }
        return false;
      };
    }

    function filteredItems() {
      const predicate = filterPredicate(activeFilter);
      const items = opportunities.filter(row => {
        const filterOk = predicate(row);
        const searchOk = !searchTerm || searchableText(row).includes(searchTerm.toLowerCase());
        return filterOk && searchOk;
      });
      return sortItems(items);
    }

    function renderFilters() {
      const counts = filterCounts();
      document.getElementById("filters").innerHTML = `
        ${FILTERS.map(stage =>
          `<button class="${stage === activeFilter ? "active" : ""}" data-stage="${h(stage)}">${h(stage)} <span class="tab-count">(${counts[stage] || 0})</span></button>`
        ).join("")}
        <button class="review-ineligible" id="reviewIneligible">Review Ineligible Set-Asides</button>
        <button class="archive-pastdue" id="archivePastDue">Archive Past Due</button>
        <div class="sort-wrap">
          <span class="label">SORT</span>
          <select id="sortMode">
            ${["Priority", "Due Date", "Recently Updated", "Stage"].map(option => `<option value="${h(option)}" ${option === sortMode ? "selected" : ""}>${h(option)}</option>`).join("")}
          </select>
        </div>`;
      document.querySelectorAll("#filters button").forEach(btn => {
        btn.onclick = () => {
          clearActionResult();
          pendingStageOverride = "";
          pendingWorkflowStageOverride = "";
          activeFilter = btn.dataset.stage;
          activeIndex = 0;
          renderFilters();
          render();
        };
      });
      const sort = document.getElementById("sortMode");
      if (sort) sort.onchange = event => {
        sortMode = event.target.value;
        activeIndex = 0;
        clearActionResult();
        pendingStageOverride = "";
        pendingWorkflowStageOverride = "";
        render();
      };
      const review = document.getElementById("reviewIneligible");
      if (review) review.onclick = showIneligibleReview;
      const archivePastDue = document.getElementById("archivePastDue");
      if (archivePastDue) archivePastDue.onclick = showPastDueArchivePreview;
    }

    function countBy(predicate) {
      return opportunities.filter(predicate).length;
    }

    function filterCounts() {
      return Object.fromEntries(FILTERS.map(name => [name, countBy(filterPredicate(name))]));
    }

    function parseDate(value) {
      if (!value) return null;
      const parsed = new Date(String(value).slice(0, 10) + "T00:00:00");
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function dueThisWeek(row) {
      if (!activeReview(row)) return false;
      const due = parseDate(row.due_date);
      if (!due) return false;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const days = Math.ceil((due - today) / 86400000);
      return days >= 0 && days <= 7;
    }

    function fitRank(row) {
      const band = textOf(row.fit_band);
      if (band.includes("high")) return 0;
      if (band.includes("med")) return 1;
      if (band.includes("low")) return 2;
      const score = Number(row.fit_score);
      if (!Number.isNaN(score)) {
        if (score >= 70) return 0;
        if (score >= 45) return 1;
        return 2;
      }
      return 3;
    }

    function dateValue(value, missingHigh = true) {
      const date = parseDate(value);
      if (date) return date.getTime();
      return missingHigh ? Number.MAX_SAFE_INTEGER : 0;
    }

    function updatedValue(value) {
      const date = value ? new Date(value) : null;
      return date && !Number.isNaN(date.getTime()) ? date.getTime() : 0;
    }

    function sortItems(items) {
      return [...items].sort((a, b) => {
        if (sortMode === "Due Date") return dateValue(a.due_date) - dateValue(b.due_date);
        if (sortMode === "Recently Updated") return updatedValue(b.last_updated) - updatedValue(a.last_updated);
        if (sortMode === "Stage") {
          const aStage = STAGE_ORDER.indexOf(currentStage(a));
          const bStage = STAGE_ORDER.indexOf(currentStage(b));
          return (aStage < 0 ? 99 : aStage) - (bStage < 0 ? 99 : bStage);
        }
        const flagged = Number(isFlagged(b)) - Number(isFlagged(a));
        if (flagged) return flagged;
        const fit = fitRank(a) - fitRank(b);
        if (fit) return fit;
        return dateValue(a.due_date) - dateValue(b.due_date);
      });
    }

    function renderCounts(items) {
      const tabCounts = filterCounts();
      const summary = [
        ["Active", tabCounts["Active"] || 0],
        ["Flagged", tabCounts["Flagged"] || 0],
        ["Due This Week", countBy(dueThisWeek)],
        ["Total", opportunities.length]
      ];
      document.getElementById("counts").innerHTML = summary.map(([k, v]) => `<span>${h(k)}: <b>${v}</b></span>`).join("");
      document.getElementById("position").textContent = items.length ? `${Math.min(activeIndex + 1, items.length)} / ${items.length}` : "0 / 0";
    }

    function qiDotColor(row) {
      const eligibility = setAsideEligibility(row);
      const hasWs = workspaceSessionIds().has(row.notice_id);
      const stage = currentStage(row);
      const ready = textOf(readiness(row).value);
      const due = row.due_date;
      let daysLeft = null;
      if (due) {
        const today = new Date(); today.setHours(0,0,0,0);
        daysLeft = Math.ceil((new Date(due + "T00:00:00") - today) / 86400000);
      }
      const pastDue = daysLeft !== null && daysLeft < 0;
      const closesToday = daysLeft === 0;
      const closes1d = daysLeft === 1;
      const closes2to7 = daysLeft !== null && daysLeft >= 2 && daysLeft <= 7;
      const ineligible = eligibility.bucket === "ineligible_now";

      if (hasWs) return "purple";
      if (ineligible || pastDue || closesToday || closes1d) return "red";
      if (closes2to7 || stage === "Manual Review"
          || ready.includes("metadata only") || ready.includes("documents needed")
          || eligibility.bucket === "watch_list") return "amber";
      if (eligibility.bucket === "eligible_now" || eligibility.bucket === "unrestricted") return "green";
      return "gray";
    }

    function qiEligShorthand(row) {
      const eligibility = setAsideEligibility(row);
      const b = eligibility.bucket;
      if (b === "eligible_now") return "SB";
      if (b === "unrestricted") return "Unrestricted";
      if (b === "watch_list") return "SDVOSB future";
      if (b === "ineligible_now") return eligibility.label + " no";
      return "Unknown";
    }

    function qiDueLabel(row) {
      const due = row.due_date;
      if (!due) return { text: "No date", cls: "qi-due-ok" };
      const today = new Date(); today.setHours(0,0,0,0);
      const daysLeft = Math.ceil((new Date(due + "T00:00:00") - today) / 86400000);
      if (daysLeft < 0) return { text: "Past", cls: "qi-due-red" };
      if (daysLeft === 0) return { text: "Today", cls: "qi-due-red" };
      if (daysLeft === 1) return { text: "1d", cls: "qi-due-red" };
      if (daysLeft <= 7) return { text: `${daysLeft}d`, cls: "qi-due-amber" };
      return { text: `${daysLeft}d`, cls: "qi-due-ok" };
    }

    function qiBadges(row) {
      const MAX = 3;
      const badges = [];
      const eligibility = setAsideEligibility(row);
      const hasWs = workspaceSessionIds().has(row.notice_id);
      const stage = currentStage(row);
      const ready = textOf(readiness(row).value);
      const aiSummary = textOf(row.ai_summary);
      const backfillSrc = textOf(row.artifact_backfill_source);
      const due = row.due_date;
      let daysLeft = null;
      if (due) {
        const today = new Date(); today.setHours(0,0,0,0);
        daysLeft = Math.ceil((new Date(due + "T00:00:00") - today) / 86400000);
      }
      const pastDue = daysLeft !== null && daysLeft < 0;
      const ineligible = eligibility.bucket === "ineligible_now";

      // 1. Critical red exception (purple + critical)
      if (hasWs && pastDue) badges.push({ label: "Past due", cls: "red" });
      else if (hasWs && ineligible) badges.push({ label: "Ineligible", cls: "red" });

      // 2. WS badge
      if (hasWs && badges.length < MAX) badges.push({ label: "WS", cls: "purple" });

      // 3. AI badge
      if (badges.length < MAX) {
        const hasAi = (aiSummary.length > 50)
          || ["bid_no_bid","decision_report","compliance_matrix","sources_sought","sources_sought_plan"].some(k => backfillSrc.includes(k))
          || ready.includes("ai reviewed") || ready.includes("response plan ready");
        if (hasAi) badges.push({ label: "AI", cls: "green" });
      }

      // 4. FLAG
      if (badges.length < MAX && isFlagged(row)) badges.push({ label: "FLAG", cls: "amber" });

      // 5. WL
      if (badges.length < MAX && isWatched(row)) badges.push({ label: "WL", cls: "cyan" });

      // 6. DOCS
      if (badges.length < MAX) {
        const hasDocs = textOf(row.document_status).length > 5
          || ["true","yes","1"].includes(textOf(row.local_attachments_found))
          || ["true","yes","1"].includes(textOf(row.attachment_download_ready))
          || ready.includes("documents ready") || ready.includes("ai review ready") || ready.includes("ai reviewed");
        if (hasDocs) badges.push({ label: "DOCS", cls: "cyan" });
      }

      // 7. REVIEW
      if (badges.length < MAX && stage === "Manual Review") badges.push({ label: "REVIEW", cls: "amber" });

      // 8. SS
      if (badges.length < MAX) {
        const isSSRFI = ["sources sought","rfi","sources_sought"].some(t =>
          textOf(row.notice_type).includes(t) || textOf(row.solicitation_type).includes(t));
        if (isSSRFI) badges.push({ label: "SS", cls: "gray" });
      }

      // 9. META
      if (badges.length < MAX && ready.includes("metadata only")) badges.push({ label: "META", cls: "gray" });

      // 10. Fit band HIGH/MED/LOW
      if (badges.length < MAX) {
        const band = textOf(row.fit_band);
        if (band.includes("high")) badges.push({ label: "HIGH", cls: "red" });
        else if (band.includes("med")) badges.push({ label: "MED", cls: "amber" });
        else if (band.includes("low")) badges.push({ label: "LOW", cls: "gray" });
      }

      return badges.slice(0, MAX);
    }

    function ineligibleReviewText() {
      const typeCounts = {};
      let protectedCount = 0;
      for (const row of opportunities) {
        const eligibility = setAsideEligibility(row);
        if (!["ineligible_now", "watch_list"].includes(eligibility.bucket)) continue;
        const key = setAsideText(row) || eligibility.label;
        typeCounts[key] = (typeCounts[key] || 0) + 1;
        if (eligibility.bucket === "ineligible_now" && isFlagged(row)) protectedCount += 1;
      }
      const lines = ["Not currently prime-eligible:"];
      const entries = Object.entries(typeCounts).sort((a, b) => b[1] - a[1]);
      if (entries.length) {
        for (const [label, count] of entries) lines.push(`- ${label}: ${count}`);
      } else {
        lines.push("- none");
      }
      lines.push("");
      lines.push(`Flagged — protected from exclusion: ${protectedCount}`);
      lines.push("");
      lines.push("Use W on a card to deliberately add it to the Watch List.");
      lines.push("No changes have been made.");
      return lines.join("\n");
    }

    function countdown(row) {
      if (!row.due_date) return `<span class="countdown ok">deadline not available</span>`;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const due = new Date(row.due_date + "T00:00:00");
      const days = Math.ceil((due - today) / 86400000);
      const close = row.deadline_time ? ` | Closes ${h(row.deadline_time)} ${h(row.deadline_tz || "")}` : "";
      if (days < 0) return `<span class="countdown danger">Past due${close}</span>`;
      if (days <= 2) return `<span class="countdown danger">!! ${days} days remaining${close}</span>`;
      if (days <= 6) return `<span class="countdown warn">${days} days remaining${close}</span>`;
      return `<span class="countdown ok">${days} days remaining${close}</span>`;
    }

    function sourceUrl(row) {
      return row.source_url || row.ui_link || row.url || row.link || row.sam_url || row.notice_url || "";

    function sourceLinkLabel(url) {

    }

    function renderSourceRow(row) {
      const url = sourceUrl(row);

      }
      if (row.notice_id) {

        return `<div class="source-row"><span class="label">SOURCE</span><span>${h(source)}</span><a href="${searchUrl}" target="_blank" rel="noopener">Search SAM.gov</a></div>`;
      }
      return `<div class="source-row"><span class="label">SOURCE</span><span>${h(source)}</span><span class="muted">source link not available</span></div>`;

    function setAsideClass(value) {

      if (!text) return "neutral";
      if (text.includes("total small business") || text === "small business" || text.includes("small business set-aside")) return "eligible";
      if (text.includes("sdvosb") || text.includes("service-disabled") || text.includes("woman-owned") || text.includes("wosb") || text.includes("edwosb") || text.includes("hubzone") || text.includes("8(a)")) return "caution";

    }

      const helper = state.helper ? `<div class="readiness-helper">${h(state.helper)}</div>` : "";

    function postAiStatus(row) {
      return postAiStatusCache.get(row?.notice_id || "") || null;
    }

    function isPostAi(row) {
      const status = postAiStatus(row);
      return !!(status && status.is_post_ai);
    }

    async function ensurePostAiStatus(row, rerender = true) {
      const id = row?.notice_id || "";
      if (!id || postAiStatusCache.has(id) || postAiStatusPending.has(id)) return;
      postAiStatusPending.add(id);
      try {
        const status = await api(`/api/post-ai-status/${encodeURIComponent(id)}`);
        postAiStatusCache.set(id, status);
      } catch (error) {
        postAiStatusCache.set(id, {
          status: "error",
          notice_id: id,
          is_post_ai: false,
          definitely_post_ai: false,
          probably_post_ai: false,
          reports_found: []
        });
        console.warn("Post-AI status check failed", id, error);
      } finally {
        postAiStatusPending.delete(id);
      }
      const current = filteredItems()[activeIndex];
      if (rerender && current?.notice_id === id) {
        renderCard(current, filteredItems());
      }
    }

    function invalidatePostAiStatus(noticeIdValue) {
      if (!noticeIdValue) return;
      postAiStatusCache.delete(noticeIdValue);
      postAiStatusPending.delete(noticeIdValue);
    }

    function renderRibbon(stage) {
      const stages = config.stage_enums?.stages || [];
      const current = stages.indexOf(stage);
      const confirm = pendingStageOverride
        ? `<div class="stage-confirm">Move to ${h(pendingStageOverride)}? <button class="warn" id="stageConfirmBtn">Confirm</button><button id="stageCancelBtn">Cancel</button></div>`
        : "";
      return `<div class="ribbon">${stages.map((s, i) => {
        const klass = s === stage ? "current" : i < current ? "done" : "future";
        return `<span class="stage ${klass}" data-stage-override="${h(s)}">${h(s)}</span>`;
      }).join("")}</div>${confirm}`;
    }

    function renderWorkflowRibbon(row) {
      const container = document.getElementById("workflowRibbon");
      if (!container) return;
      const stages = config.stage_enums?.stages || [];
      const stage = row ? currentStage(row) : "";
      const current = stages.indexOf(stage);
      const confirm = pendingWorkflowStageOverride
        ? `<div class="workflow-stage-confirm" style="--confirm-left:${workflowStageConfirmLeft}px">Move to ${h(pendingWorkflowStageOverride)}? <button class="warn" id="workflowStageConfirmBtn">Confirm</button><button id="workflowStageCancelBtn">Cancel</button></div>`
        : "";
      container.innerHTML = `
        <div class="workflow-ribbon">${stages.map((s, i) => {
          const klass = s === stage ? "current" : i < current ? "done" : "future";
          return `<span class="workflow-stage ${klass}" data-workflow-stage="${h(s)}">${h(s)}</span>`;
        }).join("")}</div>
        ${confirm}`;
      container.querySelectorAll("[data-workflow-stage]").forEach(stageEl => {
        stageEl.onclick = () => {
          if (!row) return;
          const targetStage = stageEl.dataset.workflowStage;
          if (!targetStage || targetStage === currentStage(row)) return;
          const rowRect = container.getBoundingClientRect();
          const stageRect = stageEl.getBoundingClientRect();
          workflowStageConfirmLeft = Math.max(4, Math.round(stageRect.left - rowRect.left));
          pendingWorkflowStageOverride = targetStage;
          renderWorkflowRibbon(row);
        };
      });
      const cancel = document.getElementById("workflowStageCancelBtn");
      if (cancel) cancel.onclick = () => {
        pendingWorkflowStageOverride = "";
        renderWorkflowRibbon(row);
      };
      const confirmBtn = document.getElementById("workflowStageConfirmBtn");
      if (confirmBtn) confirmBtn.onclick = () => confirmWorkflowStageOverride(row);
    }

    function descriptionText(row) {
      const values = [row.synopsis, row.description, row.full_description, row.notice_description, row.body, row.summary];
      for (const value of values) {
        const text = String(value || "").trim();
        if (!text) continue;
        if (["no", "yes", "none", "n/a", "na", "not available", "null"].includes(text.toLowerCase())) continue;
        return text;
      }
      return "";
