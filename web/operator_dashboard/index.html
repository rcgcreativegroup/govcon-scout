    }

    function descriptionBodyText(row) {
      return meaningfulValue(row.description, 51);
    }

    function aiSummaryText(row) {
      return meaningfulValue(row.ai_summary, 51);
    }

    function fullDescriptionText(row) {
      return meaningfulValue(row.full_description, 1);
    }

    function textEmpty(value) {
      const text = String(value || "").trim().toLowerCase();
      return !text || ["not available", "none", "null", "n/a", "na", "yes", "no"].includes(text);
    }

    function canFetchSynopsis(row, requireMissing = true) {
      const blockedTerms = ["pass", "archive", "ignore", "duplicate", "parked"];
      const statusText = [row.operator_status, row.triage_status, row.current_stage].join(" ").toLowerCase();
      const blocked = blockedTerms.some(term => statusText.includes(term));
      const missing = textEmpty(row.synopsis) && textEmpty(row.description);
      return (!requireMissing || missing)
        && !!sourceUrl(row)
        && !["Archive", "Done"].includes(currentStage(row))
        && !blocked
        && !!row.notice_id;
    }

    function renderFetchSynopsis(row) {
      if (!canFetchSynopsis(row, false)) return "";
      return `
        <button class="fetch-synopsis-btn" id="fetchSynopsisBtn" data-notice-id="${h(row.notice_id)}">⟳ Fetch Synopsis</button>
        <div class="fetch-synopsis-status" id="fetchSynopsisStatus"></div>`;
    }

    function renderDescription(row) {
      if (row._autoSynopsisStatus === "fetching") {
        return `<div class="muted" style="font:10px 'Courier New',monospace">⟳ Fetching synopsis...</div>`;
      }
      const sources = [
        { label: "", text: synopsisText(row), klass: "desc-preview" },
        { label: "", text: descriptionBodyText(row), klass: "desc-preview" },
        { label: "AI SUMMARY", text: aiSummaryText(row), klass: "desc-preview ai-fallback" },
        { label: "PARTIAL DESCRIPTION", text: fullDescriptionText(row), klass: "desc-preview partial-fallback" },
      ];
      const found = sources.find(item => item.text);
      if (!found) {
        const ready = readiness(row);
        const message = ["Metadata Only", "Documents Needed"].includes(ready.value)
          ? "⚠ No description available — fetch synopsis or upload documents"
          : "⚠ No description available — fetch synopsis or upload documents";
        const retry = row._autoSynopsisStatus === "empty"
          ? `<div class="muted" style="font:10px 'Courier New',monospace;margin-top:6px">SAM returned no synopsis — use S to retry or upload documents</div>`
          : "";
        return `
          <div class="missing-desc">${h(message)}</div>
          ${retry}
          ${renderFetchSynopsis(row)}`;
      }
      const text = found.text;
      const isLong = text.length > 400;
      const preview = isLong ? `${text.slice(0, 400)}...` : text;
      const label = found.label ? `<div class="hero-label">${h(found.label)}</div>` : "";
      const more = isLong
        ? `<details><summary>expand full description</summary><pre class="wrap">${h(text)}</pre></details>`
        : "";
      return `
        ${label}<div class="${h(found.klass)}">${h(preview)}</div>
        ${more}`;
    }

    function meaningfulValue(value, minLength = 1) {
      const text = String(value || "").trim();
      if (!text || ["no", "yes", "none", "n/a", "na", "not available", "null"].includes(text.toLowerCase())) return "";
      return text.length >= minLength ? text : "";
    }

    function normalizedCompare(value) {
      return String(value || "").replace(/\s+/g, " ").trim().toLowerCase();
    }

    function formatDateShort(date) {
      return date.toLocaleDateString("en-US", { month: "short", day: "2-digit" });
    }

    function renderUrgencyLine(row) {
      const raw = meaningfulValue(row.due_date);
      if (!raw) return `<div class="urgency-line warn">⚠ No deadline found — verify on source</div>`;
      const due = new Date(`${raw.slice(0, 10)}T00:00:00`);
      if (Number.isNaN(due.getTime())) {
        return `<div class="urgency-line warn">⚠ Deadline needs verification · ${h(raw)}</div>`;
      }
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const days = Math.ceil((due - today) / 86400000);
      const time = meaningfulValue(row.deadline_time);
      const tz = meaningfulValue(row.deadline_tz);
      const closes = `Closes ${formatDateShort(due)}${time ? `, ${time}${tz ? ` ${tz}` : ""}` : ""}`;
      if (days < 0) return `<div class="urgency-line danger">✕ Past due · Closed ${formatDateShort(due)}</div>`;
      if (days <= 3) return `<div class="urgency-line danger">⚠ ${days} day${days === 1 ? "" : "s"} remaining · ${h(closes)}</div>`;
      if (days <= 7) return `<div class="urgency-line warn">⚠ ${days} days remaining · ${h(closes)}</div>`;
      if (days <= 14) return `<div class="urgency-line good">${days} days remaining · ${h(closes)}</div>`;
      return `<div class="urgency-line muted">${days} days remaining · ${h(closes)}</div>`;
    }

    function snapshotData(row) {
      const candidates = [
        { source: "synopsis", text: meaningfulValue(row.synopsis, 51), klass: "" },
        { source: "ai_summary", text: meaningfulValue(row.ai_summary, 51), klass: "" },
        { source: "description", text: meaningfulValue(row.description || row.full_description, 1), klass: "fallback" },
      ];
      const found = candidates.find(item => item.text);
      if (!found) {
        return {
          text: "⚠ No description available — fetch synopsis or upload documents to get a work summary",
          fullText: "",
          source: "missing",
          klass: "missing",
          truncated: false,
        };
      }
      const fullText = found.text;
      return {
        ...found,
        fullText,
        text: fullText.length > 400 ? `${fullText.slice(0, 400).trim()}...` : fullText,
        truncated: fullText.length > 400,
      };
    }

    function renderWorkSnapshot(snapshot) {
      const more = snapshot.truncated
        ? `<details class="snapshot-more"><summary>[expand]</summary><pre>${h(snapshot.fullText)}</pre></details>`
        : "";
      return `
        <div class="hero-label">Work Snapshot</div>
        <div class="work-snapshot ${h(snapshot.klass)}">${h(snapshot.text)} ${more}</div>`;
    }

    function locationDisplay(row) {
      const city = meaningfulValue(row.place_of_performance_city);
      const state = meaningfulValue(row.place_of_performance_state);
      if (city && state) return `${city}, ${state}`;
      if (city) return city;
      if (state) return state;
      return meaningfulValue(row.place_of_performance) || "";
    }

    function renderAgencyLocation(row) {
      const location = locationDisplay(row);
      return `
        <div class="triage-grid">
          <div class="triage-box">
            <div class="hero-label">Agency</div>
            <div class="triage-value">${val(row.agency)}</div>
          </div>
          <div class="triage-box">
            <div class="hero-label">Place of Performance</div>
            <div class="triage-value ${location ? "" : "muted"}">${h(location || "Location not listed")}</div>
          </div>
        </div>`;
    }

    function eligibilityBadge(row) {
      const raw = setAsideText(row);
      if (!raw) return { label: "Set-aside Unknown ⚠", klass: "amber" };
      const eligibility = setAsideEligibility(row);
      if (eligibility.bucket === "eligible_now") return { label: "Small Business ✓", klass: "green" };
      if (eligibility.bucket === "watch_list") return { label: "SDVOSB — Future Path", klass: "amber" };
      if (eligibility.bucket === "ineligible_now") return { label: `${eligibility.label} — Not Eligible`, klass: "red" };
      return { label: "Unrestricted", klass: "gray" };
    }

    function readinessBadge(row) {
      const ready = readiness(row);
      const value = ready.value || "Metadata Only";
      const map = {
        "Metadata Only": ["Metadata Only · Fetch Synopsis", "amber"],
        "Documents Needed": ["Docs Needed · Prepare SAM Docs", "amber"],
        "Documents Ready": ["Docs Ready · Run AI Review", "cyan"],
        "AI Review Ready": ["AI Review Ready · Run Now", "cyan"],
        "AI Reviewed": ["AI Reviewed ✓", "green"],
        "Response Plan Ready": ["Response Plan Ready ✓", "green"],
        "Manual Review Needed": ["Manual Review Needed", "amber"],
      };
      const mapped = map[value] || [value, ready.style || "gray"];
      if (mapped[1] === "muted") mapped[1] = "gray";
      return { label: mapped[0], klass: mapped[1] };
    }

    function hasDecisionArtifact(row) {
      return (row.related_links || []).some(link => {
        const text = `${link.label || ""} ${link.path || ""}`.toLowerCase();
        return text.includes("decision") || text.includes("bid_no_bid") || text.includes("bid/no-bid");
      });
    }

    function statusBadges(row) {
      const badges = [eligibilityBadge(row), readinessBadge(row)];
      if (hasDecisionArtifact(row)) badges.push({ label: "Decision Report ✓", klass: "green" });
      if (isFlagged(row)) badges.push({ label: "⚑ Flagged", klass: "amber" });
      else if (isWatched(row)) badges.push({ label: "⊕ Watch List", klass: "cyan" });
      return badges.slice(0, 4).map(badge => `<span class="status-badge ${h(badge.klass)}">${h(badge.label)}</span>`).join("");
    }

    function renderSetAsideFact(row) {
      const badge = eligibilityBadge(row);
      const raw = setAsideText(row);
      const rawText = raw ? `<div class="setaside-raw">${h(raw)}</div>` : "";
      return `<div class="setaside-fact"><span class="status-badge ${h(badge.klass)}">${h(badge.label)}</span>${rawText}</div>`;
    }

    function renderHeroNextAction(row) {
      const action = meaningfulValue(row.recommended_next_action);
      if (!action) return "";
      return `<div class="hero-next-action"><span class="hero-label">Next Action</span>${h(action)}</div>`;
    }

    function renderHeroBuyer(row) {
      const name = meaningfulValue(row.buyer_name);
      const email = meaningfulValue(row.buyer_email);
      const phone = meaningfulValue(row.buyer_phone || row.phone || row.contact_phone || row.poc_phone);
      if (!name && !email && !phone) return `<div class="triage-value muted">Buyer not available</div>`;
      return `
        <div class="buyer-lines">
          ${name ? `<div>${h(name)}</div>` : ""}
          ${email ? `<div><a class="email" href="mailto:${h(email)}">${h(email)}</a> ${copyButton("copy", email)}</div>` : ""}
          ${phone ? `<div>${h(phone)} ${copyButton("copy", phone)}</div>` : ""}
        </div>`;
    }

    function renderSetAsideBuyerGrid(row) {
      return `
        <div class="triage-grid">
          <div class="triage-box">
            <div class="hero-label">Set-Aside</div>
            ${renderSetAsideFact(row)}
          </div>
          <div class="triage-box">
            <div class="hero-label">Buyer</div>
            ${renderHeroBuyer(row)}
          </div>
        </div>`;
    }

    function renderDescriptionBox(row) {
      const hint = !synopsisText(row) && !descriptionBodyText(row)
        ? `<span class="shortcut-hint">S fetch synopsis</span>`
        : "";
      return `
        <div class="description-box">
          <div class="description-label-row">
            <div class="hero-label">Description / Synopsis</div>
            ${hint}
          </div>
          <div id="descriptionContent">${renderDescription(row)}</div>
        </div>`;
    }

    function renderReadinessDocumentsGrid(row) {
      const ready = readiness(row);
      const badge = readinessBadge(row);
      const helper = meaningfulValue(ready.helper || row.next_data_step || row.document_status);
      return `
        <div class="triage-grid">
          <div class="triage-box">
            <div class="hero-label">Data Readiness</div>
            <span class="status-badge ${h(badge.klass)}">${h(badge.label)}</span>
            ${helper ? `<div class="readiness-helper">${h(helper)}</div>` : ""}
          </div>
          <div class="triage-box">
            <div class="hero-label">Documents</div>
            ${renderChecklist(row)}
            ${renderUpload(row)}
          </div>
        </div>`;
    }

    function renderTriageHero(row) {
      return `
        <div class="triage-hero">
          ${renderUrgencyLine(row)}
          ${renderAgencyLocation(row)}
          ${renderSetAsideBuyerGrid(row)}
          ${renderDescriptionBox(row)}
          ${renderReadinessDocumentsGrid(row)}
        </div>`;
    }

    function renderAiSummarySection(row, snapshot) {
      const summary = meaningfulValue(row.ai_summary || row.recommended_next_action);
      if (!summary) return "";
      if (normalizedCompare(summary) === normalizedCompare(snapshot.fullText || snapshot.text)) return "";
      if (!synopsisText(row) && !descriptionBodyText(row) && normalizedCompare(summary) === normalizedCompare(aiSummaryText(row))) return "";
      return `
        <div class="section boxed-section">
          <h3>AI / Plain-English Summary</h3>
          <div class="ai-summary-text">${h(summary)}</div>
        </div>`;
    }

    function renderNextActionSection(row) {
      const action = meaningfulValue(row.recommended_next_action);
      if (!action) return "";
      return `
        <div class="section boxed-section next-action-box">
          <h3>Recommended Next Action</h3>
          <div>${h(action)}</div>
        </div>`;
    }

    function renderRequirementsSection(row) {
      const hasRequirements = meaningfulValue(row.requirements);
      const hasDisqualifiers = meaningfulValue(row.disqualifiers);
      if (!hasRequirements && !hasDisqualifiers) return "";
      return `
        <div class="section triage-grid intelligence-grid">
          <div class="triage-box">
            <h3>Requirements</h3>
            <div class="requirements-text">${renderList(row.requirements)}</div>
          </div>
          <div class="triage-box">
            <h3>Disqualifiers</h3>
            <div class="disqualifiers-text">${renderList(row.disqualifiers)}</div>
          </div>
        </div>`;
    }

    function renderDetailedChecklist(row) {
      return `
        <div class="section boxed-section">
          <h3>Document Checklist</h3>
          ${renderChecklist(row)}
        </div>`;
    }

    function renderRelatedOutputs(row) {
      const links = row.related_links || [];
      if (!links.length) return "";
      return `
        <div class="section boxed-section">
          <h3>Related Outputs</h3>
          ${renderLinks(row)}
          <div class="copy-tools"><span class="label">Copy Tools</span><span>${UEI}</span>${copyButton("copy UEI", UEI)}</div>
        </div>`;
    }

    function renderAnalysisMarker(isPostAiCard) {
      if (isPostAiCard) {
        return `<div class="analysis-marker">── AI ANALYSIS COMPLETE ─────────────────────</div>`;
      }
      return `
        <div class="analysis-marker pending">
          <div>── AI ANALYSIS NOT YET RUN ──────────────────</div>
          <div>Requirements, disqualifiers, recommendations, and related outputs will appear here after AI Workspace review.</div>
          <button class="workspace-inline" data-action-label="Open AI Workspace">Open AI Workspace →</button>
          <div>─────────────────────────────────────────────</div>
        </div>`;
    }

    function renderDetails(row) {
      const url = sourceUrl(row);
      const sourceLink = url ? `<a href="${h(url)}" target="_blank" rel="noopener">${h(url)}</a>` : `<span class="muted">not available</span>`;
      return `
        <div class="section">
          <details class="details-block">
            <summary>Details <span>[show details]</span></summary>
            <div class="details-grid">
              <div class="detail-label">Notice ID</div><div class="detail-value">${val(noticeId(row))} ${copyButton("copy", row.notice_id)}</div>
              <div class="detail-label">NAICS / PSC</div><div class="detail-value">${val(row.naics)} / ${val(row.psc)} ${copyButton("copy NAICS", row.naics)}</div>
              <div class="detail-label">Lane</div><div class="detail-value">${val(row.lane)}</div>
              <div class="detail-label">Operator Status</div><div class="detail-value">${val(row.operator_status)}</div>
              <div class="detail-label">Source</div><div class="detail-value">${val(row.source)}</div>
              <div class="detail-label">Source URL</div><div class="detail-value">${sourceLink}</div>
              <div class="detail-label">Set-aside raw</div><div class="detail-value">${val(row.set_aside)}</div>
              <div class="detail-label">Fit Score</div><div class="detail-value">${val(row.fit_score)}</div>
            </div>
          </details>
        </div>`;
    }

    function renderUpload(row) {
      const show = ["Intake", "Manual Review"].includes(currentStage(row)) || row.operator_status === "documents_needed";
      if (!show) return "";
      return `
        <div class="upload-zone">
          <div class="hero-label">Manual Upload</div>
          <input type="file" id="uploadFile">
          <button class="warn" id="uploadBtn">Upload Document</button>
        </div>`;
    }

    function renderNotes(row) {
      const notes = row.notes || [];
      return `
        <div class="section">
          <h3>Notes / Activity</h3>
          <div class="columns">
            <div>
              <select id="noteType">${(config.stage_enums?.note_types || []).map(type => `<option value="${h(type)}">${h(type)}</option>`).join("")}</select>
              <textarea id="noteText" placeholder="Add operator note..."></textarea>
              <button id="saveNote" class="go">Save Note</button>
            </div>
            <div>
              ${notes.length ? notes.map(note => `
                <div class="note-row">
                  <div class="note-meta">${h(note.timestamp)} | ${h(note.note_type)} | ${h(note.stage)}</div>
                  <div>${h(note.note_text)}</div>
                </div>`).join("") : `<span class="muted">No notes yet.</span>`}
            </div>
          </div>
        </div>`;
    }

    function isInActionQueue(row) {
      const stage = currentStage(row);
      if (["Triage", "Intake", "Archive", "Done"].includes(stage)) return false;
      if (isArchivedStatus(row)) return false;
      if (textOf(row.operator_status).includes("move_forward")) return true;
      if (textOf(row.operator_status).includes("manual_review")) return true;
      if (stage === "Manual Review") return true;
      if (stage === "Development") return true;
      if (stage === "Ready to Submit") return true;
      if (stage === "Execution") return true;
      if (stage === "AI Review" && textOf(readiness(row).value).includes("ai reviewed")) return true;
      return false;
    }

    function actionButtons(row) {
      const stage = currentStage(row);
      const aiBtn = isInActionQueue(row)
        ? `<button data-action-label="Open AI Workspace" style="border:1px solid #9966ff;color:#9966ff;background:transparent;font:11px 'Courier New',monospace;padding:6px 14px;cursor:pointer;">Open AI Workspace</button>`
        : "";
      return aiBtn + (BUTTONS[stage] || []).map(label => {
        const klass = label.includes("PASS") || label.includes("Disqualifier") ? "risk" :
          label.includes("Manual") || label.includes("Park") || label.includes("Back") ? "warn" : "go";
        return `<button class="${klass}" data-action-label="${h(label)}">${h(label)}</button>`;
      }).join("");
    }

    function renderActionResult() {
      if (!actionResult) return "";
      const ok = actionResult.kind !== "error";
      const title = ok ? "✓ ACTION COMPLETE" : "✕ ACTION FAILED";
      const fields = actionResult.fields && actionResult.fields.length
        ? `<div class="action-result-detail">Fields filled: ${actionResult.fields.map(h).join(", ")}</div>`
        : "";
      const updated = actionResult.cardUpdated
        ? `<div class="action-result-updated">↓ Card fields updated below</div>`
        : "";
      return `
        <div class="action-result ${ok ? "success" : "error"}">
          <div class="action-result-title">${title}</div>
          <div>${h(actionResult.message || "")}</div>
          ${fields}
          ${updated}
        </div>`;
    }

    function setActionResult(result) {
      actionResult = result;
      const slot = document.getElementById("actionResultSlot");
      if (slot) slot.innerHTML = renderActionResult();
    }

    function clearActionResult() {
      actionResult = null;
      const slot = document.getElementById("actionResultSlot");
      if (slot) slot.innerHTML = "";
    }

    function applyCardData(row, result) {
      const cardData = result.card_data || {};
      const keys = Object.keys(cardData);
      for (const key of keys) row[key] = cardData[key];
      if (cardData.next_data_step && !cardData.recommended_next_action) {
        row.recommended_next_action = cardData.next_data_step;
      }
      if (result.macro_stage) row.macro_stage = result.macro_stage;
      if (hasMeaningful(row.ai_summary) || hasMeaningful(row.requirements) || hasMeaningful(row.disqualifiers)) {
        row.data_readiness = {
          value: "AI Reviewed",
          style: "green",
          tag: "reviewed",
          helper: "AI review outputs exist. Requirements and disqualifiers should be available."
        };
      } else if (hasMeaningful(row.document_status)) {
        row.data_readiness = {
          value: "Documents Ready",
          style: "cyan",
          tag: "docs ready",
          helper: row.document_status
        };
      }
      return keys.length > 0;
    }

    function renderCard(row, items) {
      if (!row) {
        document.getElementById("card").innerHTML = `<div class="muted">No matching opportunities found.</div>`;
        return;
      }
      const snapshot = snapshotData(row);
      const postAi = isPostAi(row);
      const postAiBody = `
        ${renderAnalysisMarker(true)}
        ${renderDisqualifier(row)}
        ${renderAiSummarySection(row, snapshot)}
        ${renderRequirementsSection(row)}
        ${renderNextActionSection(row)}
        ${renderDetailedChecklist(row)}
        ${renderRelatedOutputs(row)}

        <div class="section">
          <h3>Buyer / Follow-Up</h3>
          <div class="meta-grid">
            <div class="meta"><span class="label">Buyer</span>${val(row.buyer_name)}</div>
            <div class="meta"><span class="label">Phone</span>${val(row.buyer_phone)}</div>
            <div class="meta"><span class="label">Last Call</span>${val(row.last_call_date)}</div>
            <div class="meta"><span class="label">Last Call Notes</span>${val(row.last_call_notes)}</div>
          </div>
        </div>

        ${renderDetails(row)}
      `;
      const preAiBody = `
        ${renderAnalysisMarker(false)}
      `;
      document.getElementById("card").innerHTML = `
        <div class="card-header">
          <div>
            <div class="title">${h(row.title || "untitled opportunity")}</div>
            <div class="subtle">${h(row.source || "source n/a")} | ${h(noticeId(row))}</div>
            ${renderSourceRow(row)}
          </div>
          <div>
            <span class="tag ${String(row.fit_band || "").toLowerCase()}">${h(row.fit_band || "NA")}</span>
            <span class="tag">${h(row.priority || "priority n/a")}</span>
          </div>
        </div>

        ${renderTriageHero(row)}

        <div class="status-line" id="statusLine">${h(statusMessage)}</div>
        <div id="actionResultSlot">${renderActionResult()}</div>

        ${postAi ? postAiBody : preAiBody}

        ${renderNotes(row)}

        <div class="nav-row">
          <button id="prevBtn">Previous</button>
          <span class="subtle">${activeIndex + 1} / ${items.length}</span>
          <button id="nextBtn">Next</button>
        </div>
        <div class="keyboard-legend">J next · K prev · N pass · H hold · U pursue · S synopsis · W watch list · / search</div>
      `;
      wireCardEvents(row, items);
    }

    function flashStatus(message, ms = 1000) {
      statusMessage = message;
      const line = document.getElementById("statusLine");
      if (line) line.textContent = message;
      setTimeout(() => {
        if (statusMessage === message) {
          statusMessage = "";
          const currentLine = document.getElementById("statusLine");
          if (currentLine) currentLine.textContent = "";
        }
      }, ms);
    }

    async function fetchSynopsis(row, options = {}) {
      const manual = !!options.manual;
      const button = document.getElementById("fetchSynopsisBtn");
      const status = document.getElementById("fetchSynopsisStatus");
      if (!sourceUrl(row) || !row.notice_id) {
        if (manual) flashStatus("No source URL — cannot fetch synopsis");
        return;
      }
      if (button) {
        button.disabled = true;
        button.textContent = "⟳ Fetching...";
      }
      if (status) {
        status.className = "fetch-synopsis-status";
        status.textContent = "";
      }
      row._autoSynopsisStatus = "fetching";
      const container = document.getElementById("descriptionContent");
      if (container) container.innerHTML = renderDescription(row);
      try {
        const result = await api("/api/fetch-synopsis", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ notice_id: row.notice_id })
        });
        if (result.status === "ok" && result.synopsis) {
          row.description = result.synopsis;
          row.synopsis = result.synopsis;
          row._autoSynopsisStatus = "";
          const currentItems = filteredItems();
          if (currentItems[activeIndex]?.notice_id === row.notice_id) {
            renderCard(row, currentItems);
          }
          if (manual) {
            setActionResult({
              kind: "success",
              message: "Synopsis loaded from SAM API",
              fields: ["synopsis", "description"],
              cardUpdated: true
            });
          }
          return;
        }
        if (result.status === "empty") {
          row._autoSynopsisStatus = "empty";
          if (container) container.innerHTML = renderDescription(row);
          if (status) status.textContent = "SAM returned no description for this notice — try uploading documents manually or use the source link above";
          if (manual) {
            setActionResult({
              kind: "success",
              message: "SAM returned no description for this notice — try uploading documents manually or use the source link above",
              fields: [],
              cardUpdated: false
            });
          }
          if (button) {
            button.disabled = false;
            button.textContent = "⟳ Fetch Synopsis";
          }
          return;
        }
        row._autoSynopsisStatus = "";
        const errorMessage = result.message && result.message.includes("SAM API key")
          ? "SAM API key not configured — check .env file"
          : "API error — check terminal output and try again";
        if (status) {
          status.className = "fetch-synopsis-status error";
          status.textContent = errorMessage;
        }
        if (manual) {
          setActionResult({
            kind: "error",
            message: errorMessage,
            fields: [],
            cardUpdated: false
          });
        } else {
          console.warn("Auto synopsis fetch failed", row.notice_id, result.message || result.status);
        }
        if (button) {
          button.disabled = false;
          button.textContent = "⟳ Fetch Synopsis";
        }
      } catch (error) {
        row._autoSynopsisStatus = "";
        if (status) {
          status.className = "fetch-synopsis-status error";
          status.textContent = "API error — check terminal output and try again";
        }
        if (manual) {
          setActionResult({
            kind: "error",
            message: "API error — check terminal output and try again",
            fields: [],
            cardUpdated: false
          });
        } else {
          console.warn("Auto synopsis fetch failed", row.notice_id, error);
        }
        if (button) {
          button.disabled = false;
          button.textContent = "⟳ Fetch Synopsis";
        }
      }
    }

    function updateStickyBar(row) {
      const stageNameEl = document.getElementById('sticky-stage-name');
      const actionsEl   = document.getElementById('sticky-actions');
      if (!stageNameEl || !actionsEl) return;
      if (!row) { stageNameEl.textContent = '—'; actionsEl.innerHTML = ''; return; }
      const stage = currentStage(row);
      stageNameEl.textContent = stage;
      const aiBtn = isInActionQueue(row)
        ? `<button data-sticky-action="Open AI Workspace" style="border:1px solid #9966ff;color:#9966ff;background:transparent;font:11px 'Courier New',monospace;padding:4px 10px;cursor:pointer;">Open AI Workspace</button>`
        : "";
      actionsEl.innerHTML = aiBtn + (BUTTONS[stage] || []).map(label => {
        const klass = label.includes('PASS') || label.includes('Disqualifier') ? 'risk'
          : label.includes('Manual') || label.includes('Park') || label.includes('Back') ? 'warn'
          : 'go';
        return `<button class="${h(klass)}" data-sticky-action="${h(label)}">${h(label)}</button>`;
      }).join('');
      actionsEl.querySelectorAll('[data-sticky-action]').forEach(btn => {
        btn.onclick = () => handleButton(row, btn.dataset.stickyAction);
      });
    }

    function adjustLayout() {
      const topBarEl    = document.getElementById('top-bar');
      const stickyBarEl = document.getElementById('sticky-context-bar');
      const filtersEl   = document.getElementById('filters');
      const workflowEl  = document.querySelector('.workflow');
      const mainEl      = document.querySelector('.main');
      const queueEl     = document.getElementById('queue');
      const cardEl      = document.getElementById('card');
      if (!topBarEl || !stickyBarEl) return;
      const topBarH = topBarEl.offsetHeight;
      stickyBarEl.style.top = topBarH + 'px';
      const stickyBarH = stickyBarEl.offsetHeight;
      // Push filterbar below the fixed sticky bar
      if (filtersEl) filtersEl.style.marginTop = stickyBarH + 'px';
      // Recalculate main content area height accounting for all header rows
      const filterBarH = filtersEl  ? filtersEl.offsetHeight  : 0;
      const workflowH  = workflowEl ? workflowEl.offsetHeight : 0;
      const totalOffset = topBarH + stickyBarH + filterBarH + workflowH;
      if (mainEl)  mainEl.style.minHeight  = 'calc(100vh - ' + totalOffset + 'px)';
      if (queueEl) queueEl.style.maxHeight = 'calc(100vh - ' + totalOffset + 'px)';
      if (cardEl)  cardEl.style.maxHeight  = 'calc(100vh - ' + totalOffset + 'px)';
    }

    function render() {
      const items = filteredItems();
      if (activeIndex >= items.length) activeIndex = Math.max(0, items.length - 1);
      renderCounts(items);
      renderQueue(items);
      renderCard(items[activeIndex], items);
      ensurePostAiStatus(items[activeIndex]);
      updateStickyBar(items[activeIndex]);
      renderWorkflowRibbon(items[activeIndex]);
      scheduleAutoSynopsisFetch(items[activeIndex]);
      requestAnimationFrame(adjustLayout);
    }

    function shouldAutoFetchSynopsis(row) {
      if (!row || !row.notice_id || autoSynopsisAttemptedNoticeIds.has(row.notice_id)) return false;
      if (!canFetchSynopsis(row, true)) return false;
      if (["Archive", "Done", "Pass", "Ready to Submit", "Execution"].includes(currentStage(row))) return false;
      return true;
    }

    function scheduleAutoSynopsisFetch(row) {
      if (autoSynopsisTimer) {
        clearTimeout(autoSynopsisTimer);
        autoSynopsisTimer = null;
      }
      if (!shouldAutoFetchSynopsis(row)) return;
      const noticeIdForTimer = row.notice_id;
      autoSynopsisTimer = setTimeout(() => {
        const current = filteredItems()[activeIndex];
        if (!current || current.notice_id !== noticeIdForTimer || !shouldAutoFetchSynopsis(current)) return;
        autoSynopsisAttemptedNoticeIds.add(noticeIdForTimer);
        fetchSynopsis(current, { manual: false });
      }, 500);
    }

    async function updateStage(row, stage, noteType, noteText, operatorStatus = "", lastAction = "") {
      const payload = {
        notice_id: row.notice_id,
        macro_stage: stage,
        note_type: noteType || "general_note",
        note_text: noteText || "",
        operator_status: operatorStatus,
        last_operator_action: lastAction || `Moved to ${stage}`
      };
      await api("/api/stage", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      statusMessage = `Updated: ${stage}`;
      await load();
    }

    async function confirmStageOverride(row) {
      if (!row || !pendingStageOverride || pendingStageOverride === currentStage(row)) return;
      await applyManualStageOverride(row, pendingStageOverride);
      pendingStageOverride = "";
    }

    async function confirmWorkflowStageOverride(row) {
      if (!row || !pendingWorkflowStageOverride || pendingWorkflowStageOverride === currentStage(row)) return;
      await applyManualStageOverride(row, pendingWorkflowStageOverride);
      pendingWorkflowStageOverride = "";
    }

    async function applyManualStageOverride(row, nextStage) {
      let result;
      const payload = { notice_id: row.notice_id, stage: nextStage };
      try {
        result = await api("/api/set-stage", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
      } catch (error) {
        statusMessage = error.message || "Stage override failed.";
        pendingStageOverride = "";
        pendingWorkflowStageOverride = "";
        render();
        return;
      }
      const updatedStage = result.stage || result.macro_stage || nextStage;
      const updatedRow = opportunities.find(item => item.notice_id === row.notice_id) || row;
      updatedRow.macro_stage = updatedStage;
      updatedRow.last_operator_action = "manual_stage_override";
      row.macro_stage = updatedStage;
      row.last_operator_action = "manual_stage_override";
      pendingStageOverride = "";
      pendingWorkflowStageOverride = "";
      statusMessage = `Moved to ${updatedStage}`;
      setActionResult({
        kind: "success",
        message: `Stage moved to ${updatedStage}`,
        fields: ["macro_stage", "last_operator_action"],
        cardUpdated: true
      });
      renderFilters();
      const items = filteredItems();
      const visibleIndex = items.findIndex(item => item.notice_id === row.notice_id);
      if (visibleIndex >= 0) activeIndex = visibleIndex;
      renderCounts(items);
      renderQueue(items);
      renderCard(updatedRow, visibleIndex >= 0 ? items : [updatedRow]);
      updateStickyBar(updatedRow);
      renderWorkflowRibbon(updatedRow);
      requestAnimationFrame(adjustLayout);
    }

    async function saveNote(row, type, text) {
      await api("/api/note", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ notice_id: row.notice_id, note_type: type, note_text: text, stage: currentStage(row) })
      });
      statusMessage = "Note saved.";
      await load();
    }

    async function runAction(row, action) {
      statusMessage = action === "run_ai_review" ? "AI Review running — this may take a moment." : `Running ${action}...`;
      clearActionResult();
      render();
      try {
        const result = await api(`/api/action/${action}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ notice_id: row.notice_id })
        });
        statusMessage = result.message || result.status || "Action complete.";
        const cardUpdated = applyCardData(row, result);
        if (result.status === "ok" && action === "run_ai_review") {
          invalidatePostAiStatus(row.notice_id);
          ensurePostAiStatus(row);
        }
        setActionResult({
          kind: result.status === "error" ? "error" : "success",
          message: result.error || result.message || result.status || "Action complete.",
          fields: result.fields_filled || [],
          cardUpdated
        });
        renderCard(row, filteredItems());
      } catch (error) {
        statusMessage = error.message || "Action failed.";
        setActionResult({
          kind: "error",
          message: error.message || "Action failed.",
          fields: [],
          cardUpdated: false
        });
      }
    }

    async function handleButton(row, label) {
      if (!row.notice_id) {
        statusMessage = "Missing notice_id; cannot update this card.";
        render();
        return;
      }
      if (label === "YES — Intake Docs") {
        const note = prompt("Decision note (optional):") || "";
        return updateStage(row, "Intake", "general_note", note, "", "Moved to Intake.");
      }
      if (label === "Open AI Workspace") {
        openAIWorkspace(row);
        return;
      }
      if (label === "Move Forward") {
        if (activeFilter === "Active") {
          const items = filteredItems();
          if (activeIndex < items.length - 1) activeIndex++;
        }
        return updateStage(row, "Development", "general_note", "Operator marked Move Forward during batch triage", "move_forward", "Moved Forward during batch triage.");
      }
      if (label === "Manual Review") {
        const note = prompt("What needs checking?");
        if (note === null) return;
        if (activeFilter === "Active") {
          const items = filteredItems();
          if (activeIndex < items.length - 1) activeIndex++;
        }
        const noteText = note || "Operator flagged for manual review during batch triage";
        return updateStage(row, "Manual Review", "risk_note", noteText, "manual_review", "Moved to Manual Review.");
      }
      if (label === "PASS") {
        const note = prompt("Why are you passing?");
        if (!note) return;
        return updateStage(row, "Archive", "risk_note", note, "pass", "Passed/archived by operator.");
      }
      if (label === "Prepare SAM Docs") return runAction(row, "prepare_docs");
      if (label === "Manual Upload") {
        const input = document.getElementById("uploadFile");
        if (input) input.focus();
        statusMessage = "Use the upload zone below.";
        return render();
      }
      if (label === "Bypass to AI Review") {
        return updateStage(row, "AI Review", "general_note", "Operator bypassed intake to AI Review.", "", "Bypassed to AI Review.");
      }
      if (label === "Advance to AI Review") return updateStage(row, "AI Review", "general_note", "", "", "Advanced to AI Review.");
      if (label === "Advance to Development") return updateStage(row, "Development", "general_note", "", "", "Advanced to Development.");
      if (label === "Run AI Review") return runAction(row, "run_ai_review");
      if (label === "Flag Disqualifier") {
        const note = prompt("What is the disqualifier?");
        if (!note) return;
        return updateStage(row, "Archive", "risk_note", note, "disqualified", "Flagged hard disqualifier.");
      }
      if (label === "Log Vendor Quote") {
        const note = prompt("What quote is needed and from whom?");
        if (!note) return;
        return saveNote(row, "vendor_quote_note", note);
      }
      if (label === "Draft Response") return runAction(row, "draft_response");
      if (label === "Mark Ready to Submit") return updateStage(row, "Ready to Submit", "general_note", "", "", "Marked ready to submit.");
      if (label === "Mark Submitted") {
        const note = prompt("What was submitted and to whom?");
        if (!note) return;
        return updateStage(row, "Execution", "submission_note", note, "submitted", "Marked submitted.");
      }
      if (label === "Send Back to Development") return updateStage(row, "Development", "general_note", "", "", "Sent back to Development.");
      if (label === "Log Follow-Up") {
        const note = prompt("Follow up when and why?");
        if (!note) return;
        return saveNote(row, "follow_up_note", note);
      }
      if (label === "Mark Done") return updateStage(row, "Done", "general_note", "", "done", "Marked done.");
      if (label === "Park") {
        const note = prompt("Park note (optional):") || "";
        return updateStage(row, "Archive", "general_note", note, "parked", "Parked by operator.");
      }
      if (label === "Reactivate") {
        const choice = prompt("Reactivate to which stage? Type Triage or Manual Review.", "Triage") || "Triage";
        const stage = choice === "Manual Review" ? "Manual Review" : "Triage";
        return updateStage(row, stage, "general_note", `Reactivated to ${stage}.`, "", "Reactivated.");
      }
    }

    function toggleHold(row) {
      const wasFlagged = isFlagged(row);
      row.flagged = isFlagged(row) ? "" : "true";
      statusMessage = isFlagged(row) ? "Held / flagged for review." : "Hold removed.";
      if (!wasFlagged && activeFilter === "Active") {
        const nextItems = filteredItems();
        if (activeIndex >= nextItems.length) activeIndex = Math.max(0, nextItems.length - 1);
      }
      if (wasFlagged && activeFilter === "Flagged") {
        const nextItems = filteredItems();
        if (activeIndex >= nextItems.length) activeIndex = Math.max(0, nextItems.length - 1);
      }
      renderFilters();
      render();
    }

    async function toggleWatch(row) {
      if (!row.notice_id) {
        flashStatus("Missing notice_id — cannot update Watch List");
        return;
      }
      const watchValue = !isWatched(row);
      try {
        const result = await api("/api/watch", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ notice_id: row.notice_id, watch_list: watchValue })
        });
        row.watch_list = result.watch_list ? "true" : "";
        statusMessage = result.watch_list ? "⊕ Added to Watch List" : "⊖ Removed from Watch List";
        renderFilters();
        render();
      } catch (error) {
        flashStatus(error.message || "Watch List update failed");
      }
    }

    function shortcutFetchSynopsis(row) {
      const button = document.getElementById("fetchSynopsisBtn");
      if (button) {
        fetchSynopsis(row, { manual: true });
        return;
      }
      if (!sourceUrl(row)) {
        flashStatus("No source URL — cannot fetch synopsis");
        return;
      }
      fetchSynopsis(row, { manual: true });
    }

    function wireCardEvents(row, items) {
      document.querySelectorAll("[data-copy]").forEach(btn => {
        btn.onclick = async () => {
          await navigator.clipboard.writeText(btn.dataset.copy);
          btn.textContent = "copied";
          setTimeout(() => { btn.textContent = "copy"; }, 900);
        };
      });
      document.querySelectorAll("[data-action-label]").forEach(btn => {
        btn.onclick = () => handleButton(row, btn.dataset.actionLabel);
      });
      document.querySelectorAll("[data-stage-override]").forEach(stageEl => {
        stageEl.onclick = () => {
          const targetStage = stageEl.dataset.stageOverride;
          if (!targetStage || targetStage === currentStage(row)) return;
          pendingStageOverride = targetStage;
          renderCard(row, items);
          updateStickyBar(row);
        };
      });
      const stageCancel = document.getElementById("stageCancelBtn");
      if (stageCancel) stageCancel.onclick = () => {
        pendingStageOverride = "";
        renderCard(row, items);
        updateStickyBar(row);
      };
      const stageConfirm = document.getElementById("stageConfirmBtn");
      if (stageConfirm) stageConfirm.onclick = () => confirmStageOverride(row);
      const fetchButton = document.getElementById("fetchSynopsisBtn");
      if (fetchButton) fetchButton.onclick = () => fetchSynopsis(row, { manual: true });
      const details = document.querySelector(".details-block");
      if (details) {
        details.ontoggle = () => {
          const label = details.querySelector("summary span");
          if (label) label.textContent = details.open ? "[hide details]" : "[show details]";
        };
      }
      const prev = document.getElementById("prevBtn");
      const next = document.getElementById("nextBtn");
      if (prev) prev.onclick = () => { clearActionResult(); pendingStageOverride = ""; pendingWorkflowStageOverride = ""; activeIndex = Math.max(0, activeIndex - 1); render(); };
      if (next) next.onclick = () => { clearActionResult(); pendingStageOverride = ""; pendingWorkflowStageOverride = ""; activeIndex = Math.min(items.length - 1, activeIndex + 1); render(); };
      const save = document.getElementById("saveNote");
      if (save) save.onclick = () => {
        const type = document.getElementById("noteType").value;
        const text = document.getElementById("noteText").value.trim();
        if (!text) return;
        saveNote(row, type, text);
      };
      const uploadBtn = document.getElementById("uploadBtn");
      if (uploadBtn) uploadBtn.onclick = async () => {
        const file = document.getElementById("uploadFile").files[0];
        if (!file) {
          statusMessage = "Choose a file first.";
          render();
          return;
        }
        const form = new FormData();
        form.append("file", file);
        const result = await fetch(`/api/upload/${encodeURIComponent(row.notice_id)}`, { method: "POST", body: form });
        const data = await result.json();
        statusMessage = data.error || `Uploaded ${file.name}; moved to AI Review.`;
        await load();
      };
    }

    document.getElementById("search").addEventListener("input", event => {
      searchTerm = event.target.value;
      activeIndex = 0;
      clearActionResult();
      pendingStageOverride = "";
      pendingWorkflowStageOverride = "";
      render();
    });
    document.getElementById("resetSearch").onclick = () => {
      searchTerm = "";
      document.getElementById("search").value = "";
      activeIndex = 0;
      clearActionResult();
      pendingStageOverride = "";
      pendingWorkflowStageOverride = "";
      render();
    };

    document.addEventListener("keydown", event => {
      const target = event.target;
      const typing = ["INPUT", "TEXTAREA", "SELECT"].includes(target.tagName);
      if (event.key === "/" && !typing) {
        event.preventDefault();
        document.getElementById("search").focus();
        return;
      }
      if (typing) return;
      const items = filteredItems();
      const row = items[activeIndex];
      if (!row) return;
      if (event.key.toLowerCase() === "j") {
        clearActionResult();
        pendingStageOverride = "";
        pendingWorkflowStageOverride = "";
        activeIndex = Math.min(items.length - 1, activeIndex + 1);
        render();
      } else if (event.key.toLowerCase() === "k") {
        clearActionResult();
        pendingStageOverride = "";
        pendingWorkflowStageOverride = "";
        activeIndex = Math.max(0, activeIndex - 1);
        render();
      } else if (event.key.toLowerCase() === "n") {
        handleButton(row, "PASS");
      } else if (event.key.toLowerCase() === "h") {
        toggleHold(row);
      } else if (event.key.toLowerCase() === "w") {
        toggleWatch(row);
      } else if (event.key.toLowerCase() === "u" && currentStage(row) === "Triage") {
        handleButton(row, "YES — Intake Docs");
      } else if (event.key.toLowerCase() === "s") {
        shortcutFetchSynopsis(row);
      } else if (event.key === "Enter") {
        const note = document.getElementById("noteText");
        if (note) note.focus();
      }
    });

    // Position sticky bar and adjust layout before data loads, then again after render
    requestAnimationFrame(adjustLayout);
    window.addEventListener('resize', adjustLayout);

    load().catch(error => {
      document.getElementById("card").innerHTML = `<div class="disq HARD">Dashboard failed: ${h(error.message)}</div>`;
    });
  </script>

      </div>
      <div id="workspaceBrowserList"></div>

  <script>
    // ── AI WORKSPACE ──────────────────────────────────────────────────────

    let wsNoticeId = null;
    let wsLoading = false;

    const QUICK_ACTIONS = [
      {
        label: "Draft Buyer Email",
        prompt: "Draft a professional email to the buyer. Based on the opportunity requirements and next steps, identify the most important question to ask and write a ready-to-send email.",
        draft_type: "buyer_email"
      },
      {
        label: "Draft Vendor Quote Request",
        prompt: "Create a vendor quote request I can send to subcontractors for this work. Include the scope of work, place of performance, due date for quotes, and exactly what information I need from them to price this accurately.",
        draft_type: "vendor_quote_request"
      },
      {
        label: "Compliance Checklist",
        prompt: "Create a compliance checklist of everything I need to submit for this opportunity. Format it as a numbered list I can check off.",
        draft_type: "compliance_checklist"
      },
      {
        label: "Proposal Outline",
        prompt: "Create a proposal outline for this opportunity based on the requirements and submission instructions.",
        draft_type: "proposal_outline"
      },
      {
        label: "Source-Sought Response",
        prompt: "Draft a source-sought response for this notice if appropriate. If this is not a source-sought/RFI notice, tell me whether a source-sought-style response is appropriate or whether I need a quote/proposal instead.",
        draft_type: "source_sought_response"
      },
      {
        label: "Summarize Requirements",
        prompt: "Summarize all requirements for this opportunity in plain English in under 200 words. Focus on what I actually need to do and provide.",
        draft_type: null
      },
      {
        label: "Explain Submission Method",
        prompt: "Explain exactly how and where to submit my response for this opportunity. Include the deadline, format, and any specific instructions.",
        draft_type: null
      },
      {
        label: "Find Red Flags",
        prompt: "What are the biggest risks and red flags I should be aware of before committing to this opportunity? Be direct and specific.",
        draft_type: null
      }
    ];

    function wsSetLoading(on) {
      wsLoading = on;
      const send = document.getElementById("aiWsSend");
      const input = document.getElementById("aiWsInput");
      if (send) send.disabled = on;
      if (input) input.disabled = on;
      document.querySelectorAll(".ws-qa-btn").forEach(b => b.disabled = on);
    }

    function wsScrollBottom() {
      const convo = document.getElementById("aiWsConvo");
      if (convo) requestAnimationFrame(() => { convo.scrollTop = convo.scrollHeight; });
    }

    function wsAppendMessage(role, text) {
      const convo = document.getElementById("aiWsConvo");
      if (!convo) return null;
      const div = document.createElement("div");
      div.className = role === "user" ? "ws-msg-user" : role === "error" ? "ws-msg-error" : "ws-msg-ai";
      div.textContent = text;
      convo.appendChild(div);
      wsScrollBottom();
      return div;
    }

    function wsFormatDate(value) {
      if (!value) return "not available";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      const hh = String(date.getHours()).padStart(2, "0");
      const mm = String(date.getMinutes()).padStart(2, "0");
      return `${months[date.getMonth()]} ${date.getDate()} ${hh}:${mm}`;
    }

    function wsAppendSessionSummary(noticeId, messageCount, lastUpdated) {
      const convo = document.getElementById("aiWsConvo");
      if (!convo) return;
      const div = document.createElement("div");
      div.className = "ws-session-summary";
      div.textContent = [
        "── PREVIOUS SESSION ──────────────────────────────",
        `${noticeId} · ${messageCount} messages · Last: ${wsFormatDate(lastUpdated)}`,
        "──────────────────────────────────────────────────"
      ].join("\n");
      convo.appendChild(div);
    }

    function wsAppendContinuationPrompt() {
      const convo = document.getElementById("aiWsConvo");
      if (!convo) return;
      const div = document.createElement("div");
      div.className = "ws-continuation";
      div.textContent = "↓ Continuing previous session — type a message or use a Quick Action";
      convo.appendChild(div);
      wsScrollBottom();
    }

    function wsRenderHistory(historyResponse) {
      const history = Array.isArray(historyResponse.history) ? historyResponse.history : [];
      if (!history.length) return false;
      wsAppendSessionSummary(
        historyResponse.notice_id || wsNoticeId,
        historyResponse.message_count || history.length,
        historyResponse.last_updated || ""
      );
      for (const message of history) {
        const role = message.role === "user" ? "user" : "ai";
        const msgDiv = wsAppendMessage(role, message.content || "");
        if (role === "ai") wsAddSaveBar(msgDiv, null);
      }
      wsAppendContinuationPrompt();
      wsScrollBottom();
      return true;
    }

    function wsAddSaveBar(msgDiv, suggestedDraftType) {
      if (!msgDiv) return;
      const bar = document.createElement("div");
      bar.className = "ws-save-bar";
      const btn = document.createElement("button");
      btn.className = "ws-save-btn";
      btn.textContent = "Save Draft";
      const confirm = document.createElement("span");
      confirm.className = "ws-save-confirm";
      bar.appendChild(btn);
      bar.appendChild(confirm);
      msgDiv.after(bar);

      btn.onclick = async () => {
        const types = Object.keys({
          buyer_email: 1, vendor_quote_request: 1, compliance_checklist: 1,
          proposal_outline: 1, source_sought_response: 1, general_notes: 1
        });
        const choice = prompt(
          "Save as draft type:\n" + types.map((t, i) => `${i + 1}. ${t}`).join("\n") +
          (suggestedDraftType ? `\n\nSuggested: ${suggestedDraftType}` : "") +
          "\n\nType the draft type name:",
          suggestedDraftType || "general_notes"
        );
        if (!choice) return;
        const draftType = choice.trim();
        try {
          const res = await api("/api/workspace-save-draft", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ notice_id: wsNoticeId, draft_type: draftType, content: msgDiv.textContent })
          });
          if (res.status === "ok") {
            confirm.textContent = `✓ Saved to ${res.path}`;
            wsRefreshDrafts();
          } else {
            confirm.textContent = `⚠ ${res.message || "Save failed"}`;
          }
        } catch (err) {
          confirm.textContent = `⚠ Save failed`;
        }
      };
    }

    function wsShowThinking() {
      const convo = document.getElementById("aiWsConvo");
      if (!convo) return null;
      const div = document.createElement("div");
      div.className = "ws-msg-thinking";
      div.textContent = "⟳ Thinking...";
      convo.appendChild(div);
      wsScrollBottom();
      return div;
    }

    async function wsSendMessage(message, suggestedDraftType) {
      if (wsLoading || !message.trim() || !wsNoticeId) return;
      wsAppendMessage("user", message);
      const thinking = wsShowThinking();
      wsSetLoading(true);
      try {
        const res = await api("/api/workspace-chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ notice_id: wsNoticeId, message })
        });
        if (thinking) thinking.remove();
        if (res.status === "ok") {
          const msgDiv = wsAppendMessage("ai", res.response);
          wsAddSaveBar(msgDiv, suggestedDraftType || null);
          invalidatePostAiStatus(wsNoticeId);
          const current = filteredItems()[activeIndex];
          if (current?.notice_id === wsNoticeId) ensurePostAiStatus(current);
          await refreshWorkspaceSessions(true);
        } else {
          wsAppendMessage("error", `⚠ AI response failed — ${res.message || "unknown error"}`);
        }
      } catch (err) {
        if (thinking) thinking.remove();
        wsAppendMessage("error", `⚠ AI response failed — ${err.message}`);
      } finally {
        wsSetLoading(false);
      }
    }

    async function wsRefreshDrafts() {
      if (!wsNoticeId) return;
      try {
        const ctx = await api(`/api/workspace-context/${encodeURIComponent(wsNoticeId)}`);
        const saved = ctx.saved_drafts || [];
        const container = document.getElementById("aiWsDraftsList");
        if (!container) return;
        if (!saved.length) {
          container.innerHTML = `<div style="color:#555;font:11px 'Courier New',monospace">No saved drafts</div>`;
          return;
        }
        container.innerHTML = "";
        for (const fname of saved) {
          const draftType = Object.entries({
            buyer_email_draft: "buyer_email",
            vendor_quote_request: "vendor_quote_request",
            compliance_checklist: "compliance_checklist",
            proposal_outline: "proposal_outline",
            source_sought_response: "source_sought_response",
            workspace_notes: "general_notes"
          }).find(([k]) => fname.startsWith(k))?.[1] || "general_notes";
          const btn = document.createElement("button");
          btn.className = "ws-draft-btn";
          btn.textContent = fname;
          btn.onclick = () => wsOpenDraftModal(draftType, fname);
          container.appendChild(btn);
        }
      } catch {}
    }

    async function wsOpenDraftModal(draftType, fname) {
      const modal = document.getElementById("draftReadModal");
      const title = document.getElementById("draftReadModalTitle");
      const body = document.getElementById("draftReadModalBody");
      if (!modal) return;
      title.textContent = fname || draftType;
      body.textContent = "Loading...";
      modal.classList.add("open");
      try {
        const res = await api(`/api/workspace-draft/${encodeURIComponent(wsNoticeId)}/${encodeURIComponent(draftType)}`);
        if (res.status === "ok") {
          body.textContent = res.content;
        } else {
          body.textContent = `Not found: ${res.message || ""}`;
        }
      } catch (err) {
        body.textContent = `Error loading draft: ${err.message}`;
      }
    }

    function wsRenderLeft(ctx) {
      const left = document.getElementById("aiWsLeft");
      if (!left) return;

      const due = ctx.due_date || "";
      let daysLabel = "";
      if (due) {
        const today = new Date(); today.setHours(0,0,0,0);
        const dueDate = new Date(due + "T00:00:00");
        const days = Math.ceil((dueDate - today) / 86400000);
        daysLabel = days < 0 ? ` (past due)` : ` (${days}d)`;
      }

      const checks = [
        { label: "Synopsis",            has: !!(ctx.synopsis && ctx.synopsis.length > 20) },
        { label: "AI Review",           has: !!ctx.ai_summary },
        { label: "Decision Report",     has: ctx.reports_available?.decision_report },
        { label: "Compliance Matrix",   has: ctx.reports_available?.compliance_matrix },
        { label: "Downloaded Docs",     has: ctx.documents_available?.length > 0 },
        { label: "Document Extracts",   has: ctx.document_extracts_available },
        { label: "Operator Notes",      has: ctx.operator_notes?.length > 0 },
        { label: "Saved Drafts",        has: ctx.saved_drafts?.length > 0 },
      ];
      const downloadedDocs = ctx.documents_available?.length > 0;
      const extractsReady = !!ctx.document_extracts_available;
      const showExtractButton = downloadedDocs && !extractsReady;
      const extractButton = showExtractButton ? `
        <button id="aiWsExtractDocs" class="ws-extract-btn">⟳ Extract Documents</button>
        <div id="aiWsExtractStatus" class="ws-extract-status"></div>
      ` : "";

      const savedDrafts = ctx.saved_drafts || [];
      const draftItems = savedDrafts.map(fname => {
        const draftType = Object.entries({
          buyer_email_draft: "buyer_email",
          vendor_quote_request: "vendor_quote_request",
          compliance_checklist: "compliance_checklist",
          proposal_outline: "proposal_outline",
          source_sought_response: "source_sought_response",
          workspace_notes: "general_notes"
        }).find(([k]) => fname.startsWith(k))?.[1] || "general_notes";
        return `<button class="ws-draft-btn" data-draft-type="${h(draftType)}" data-draft-fname="${h(fname)}">${h(fname)}</button>`;
      }).join("") || `<div style="color:#555;font:11px 'Courier New',monospace">No saved drafts</div>`;

      left.innerHTML = `
        <span class="ws-section-label">Context</span>
        <ul class="ws-check">
          ${checks.map(c => `<li class="${c.has ? "has" : "missing"}">${c.has ? "✓" : "✗"} ${h(c.label)}</li>`).join("")}
        </ul>
        ${extractButton}

        <span class="ws-section-label">Metadata</span>
        <div class="ws-meta-row">Due: <span>${h(due)}${h(daysLabel)}</span></div>
        <div class="ws-meta-row">Buyer: <span>${h(ctx.buyer?.name || "—")}</span></div>
        <div class="ws-meta-row">Email: <span>${h(ctx.buyer?.email || "—")}</span></div>
        <div class="ws-meta-row">Phone: <span>${h(ctx.buyer?.phone || "—")}</span></div>
        <div class="ws-meta-row">Set-aside: <span>${h(ctx.set_aside || "—")}</span></div>
        <div class="ws-meta-row">Location: <span>${h(ctx.place_of_performance || "—")}</span></div>
        <div class="ws-meta-row">Stage: <span>${h(ctx.macro_stage || "—")}</span></div>

        <span class="ws-section-label">Quick Actions</span>
        ${QUICK_ACTIONS.map((qa, i) =>
          `<button class="ws-qa-btn" data-qa-index="${i}">${h(qa.label)}</button>`
        ).join("")}

        <span class="ws-section-label">Saved Drafts</span>
        <div id="aiWsDraftsList">${draftItems}</div>
      `;

      left.querySelectorAll(".ws-qa-btn").forEach(btn => {
        const idx = Number(btn.dataset.qaIndex);
        btn.onclick = () => {
          if (wsLoading) return;
          const qa = QUICK_ACTIONS[idx];
          const input = document.getElementById("aiWsInput");
          if (input) input.value = "";
          wsSendMessage(qa.prompt, qa.draft_type);
        };
      });

      left.querySelectorAll(".ws-draft-btn").forEach(btn => {
        btn.onclick = () => wsOpenDraftModal(btn.dataset.draftType, btn.dataset.draftFname);
      });

      const extractBtn = left.querySelector("#aiWsExtractDocs");
      if (extractBtn) {
        extractBtn.onclick = () => wsExtractDocuments();
      }
    }

    async function wsExtractDocuments() {
      if (!wsNoticeId) return;
      const btn = document.getElementById("aiWsExtractDocs");
      const status = document.getElementById("aiWsExtractStatus");
      if (btn) {
        btn.disabled = true;
        btn.textContent = "⟳ Extracting...";
      }
      if (status) {
        status.className = "ws-extract-status";
        status.textContent = "⟳ Extracting documents...";
      }
      try {
        const res = await api("/api/extract-documents", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ notice_id: wsNoticeId })
        });
        if (res.status === "ok") {
          if (status) {
            status.className = "ws-extract-status ok";
            status.textContent = `✓ Extracted ${res.extract_file_count || 0} file(s). Refreshing context...`;
          }
          const ctx = await api(`/api/workspace-context/${encodeURIComponent(wsNoticeId)}`);
          wsRenderLeft(ctx);
          return;
        }
        throw new Error(res.message || "Unknown extraction error");
      } catch (err) {
        if (status) {
          status.className = "ws-extract-status error";
          status.textContent = `⚠ Extraction failed — ${err.message}`;
        }
        if (btn) {
          btn.disabled = false;
          btn.textContent = "⟳ Extract Documents";
        }
      }
    }

    async function openAIWorkspace(row) {
      wsNoticeId = row.notice_id || "";
      if (!wsNoticeId) return;

      const overlay = document.getElementById("aiWorkspaceOverlay");
      const convo = document.getElementById("aiWsConvo");
      const left = document.getElementById("aiWsLeft");
      const header = document.getElementById("aiWsHeaderNotice");

      overlay.classList.add("open");
      if (header) header.textContent = `— ${row.title || wsNoticeId} [${wsNoticeId}]`;
      if (convo) convo.innerHTML = "";
      if (left) left.innerHTML = `<div id="aiWsLeftLoading">Loading context...</div>`;

      const input = document.getElementById("aiWsInput");
      if (input) input.value = "";

      try {
        const ctx = await api(`/api/workspace-context/${encodeURIComponent(wsNoticeId)}`);
        if (ctx.error) {
          if (left) left.innerHTML = `<div style="color:#ff6666;font:11px 'Courier New',monospace">⚠ Could not load opportunity context</div>`;
        } else {
          wsRenderLeft(ctx);
        }

        let renderedHistory = false;
        if (ctx.conversation_history_available) {
          const history = await api(`/api/workspace-history/${encodeURIComponent(wsNoticeId)}`);
          renderedHistory = history.status === "ok" && wsRenderHistory(history);
        }
        if (!renderedHistory) {
          await wsSendMessage(
            "I just opened the AI Workspace for this opportunity. Based on everything you know about it, what should I focus on first and what are the most important next steps?"
          );
        }
      } catch (err) {
        if (left) left.innerHTML = `<div style="color:#ff6666;font:11px 'Courier New',monospace">⚠ Could not load opportunity context: ${h(err.message)}</div>`;
      }
    }

    function closeAIWorkspace() {
      const overlay = document.getElementById("aiWorkspaceOverlay");
      if (overlay) overlay.classList.remove("open");
      wsNoticeId = null;
    }

    function truncateTitle(value, limit = 60) {
      const text = String(value || "").trim();
      return text.length > limit ? text.slice(0, limit - 1) + "…" : text;
    }

    function rowForNoticeId(noticeId, fallbackTitle = "") {
      return opportunities.find(row => row.notice_id === noticeId) || {
        notice_id: noticeId,
        title: fallbackTitle || noticeId
      };
    }

    function renderWorkspaceBrowser() {
      const list = document.getElementById("workspaceBrowserList");
      if (!list) return;
      const sessions = workspaceSessions || [];
      if (!sessions.length) {
        list.innerHTML = `<div class="muted">No workspace sessions yet.<br>Open the AI Workspace on any Move Forward or Development card to start one.</div>`;
        return;
      }
      list.innerHTML = sessions.map(session => {
        const item = typeof session === "string" ? {
          notice_id: session,
          title: session,
          message_count: 0,
          draft_count: 0,
          last_updated: ""
        } : session;
        return `
          <div class="workspace-session-row">
            <div>
              <div class="workspace-session-title">${h(item.notice_id)} &nbsp; ${h(truncateTitle(item.title || item.notice_id))}</div>
              <div class="workspace-session-meta">${h(item.message_count || 0)} messages · Last active: ${h(wsFormatDate(item.last_updated))} · Drafts: ${h(item.draft_count || 0)}</div>
            </div>
            <button class="workspace-open-btn" data-notice-id="${h(item.notice_id)}" data-title="${h(item.title || item.notice_id)}">Open Workspace</button>
          </div>`;
      }).join("");
      list.querySelectorAll(".workspace-open-btn").forEach(btn => {
        btn.onclick = () => {
          closeWorkspaceBrowser();
          openAIWorkspace(rowForNoticeId(btn.dataset.noticeId, btn.dataset.title));
        };
      });
    }

    async function openWorkspaceBrowser() {
      await refreshWorkspaceSessions(true);
      renderWorkspaceBrowser();
      const overlay = document.getElementById("workspaceBrowserOverlay");
      if (overlay) overlay.classList.add("open");
    }

    function closeWorkspaceBrowser() {
      const overlay = document.getElementById("workspaceBrowserOverlay");
      if (overlay) overlay.classList.remove("open");
    }

    function initWorkspaceEvents() {
      const close = document.getElementById("aiWsClose");
      if (close) close.onclick = closeAIWorkspace;

      const openBrowser = document.getElementById("openWorkspacesBtn");
      if (openBrowser) openBrowser.onclick = openWorkspaceBrowser;

      const closeBrowser = document.getElementById("workspaceBrowserClose");
      if (closeBrowser) closeBrowser.onclick = closeWorkspaceBrowser;

      const send = document.getElementById("aiWsSend");
      const input = document.getElementById("aiWsInput");
      if (send && input) {
        send.onclick = () => {
          const msg = input.value.trim();
          if (!msg) return;
          input.value = "";
          wsSendMessage(msg);
        };
        input.addEventListener("keydown", event => {
          if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
            event.preventDefault();
            send.click();
          }
        });
      }

      const overlay = document.getElementById("aiWorkspaceOverlay");
      if (overlay) {
        overlay.addEventListener("keydown", event => {
          if (event.key === "Escape") closeAIWorkspace();
        });
      }

      const draftClose = document.getElementById("draftReadModalClose");
      if (draftClose) draftClose.onclick = () => {
        document.getElementById("draftReadModal").classList.remove("open");
      };
    }

    document.addEventListener("DOMContentLoaded", initWorkspaceEvents);

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        const overlay = document.getElementById("aiWorkspaceOverlay");
        if (overlay && overlay.classList.contains("open")) {
          closeAIWorkspace();
          event.stopPropagation();
        }
        const draftModal = document.getElementById("draftReadModal");
        if (draftModal && draftModal.classList.contains("open")) {
          draftModal.classList.remove("open");
          event.stopPropagation();
        }
        const workspaceBrowser = document.getElementById("workspaceBrowserOverlay");
        if (workspaceBrowser && workspaceBrowser.classList.contains("open")) {
          closeWorkspaceBrowser();
          event.stopPropagation();
        }
      }
    });
  </script>
</body>
</html>
