<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GovCon Scout Operator Dashboard</title>
  <style>
    :root {
      --page: #0e0e10;
      --card: #141416;
      --top: #141416;
      --filter: #111114;
      --queue: #0c0c0e;
      --input: #1a1a1e;
      --border: #2a2a2e;
      --text: #e0e0e0;
      --secondary: #888888;
      --muted: #555555;
      --green: #00ff88;
      --go-bg: #1a2e1a;
      --amber: #f0a500;
      --amber-bg: #2a1f0a;
      --red: #ff4444;
      --cyan: #4499ff;
      --purple: #9966ff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--page);
      color: var(--text);
      font-family: "Courier New", monospace;
      font-size: 11px;
    }
    button, input, select, textarea {
      font-family: "Courier New", monospace;
      border-radius: 0;
    }
    button {
      background: var(--input);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 7px 9px;
      cursor: pointer;
      font-size: 11px;
    }
    button:hover { border-color: var(--green); color: var(--green); }
    button.go { background: var(--go-bg); color: var(--green); border-color: var(--green); }
    button.warn { background: var(--amber-bg); color: var(--amber); border-color: var(--amber); }
    button.risk { background: #2a1010; color: var(--red); border-color: var(--red); }
    input, select, textarea {
      background: var(--input);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 7px;
      width: 100%;
      font-size: 11px;
    }
    textarea { min-height: 72px; resize: vertical; }
    a { color: var(--cyan); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .topbar {
      height: 54px;
      display: grid;
      grid-template-columns: 290px 1fr 360px;
      gap: 14px;
      align-items: center;
      padding: 9px 12px;
      background: var(--top);
      border-bottom: 1px solid var(--border);
    }
    .brand { color: var(--green); font-size: 14px; font-weight: bold; }
    .counts { color: var(--secondary); display: flex; gap: 14px; flex-wrap: wrap; }
    .counts b { color: var(--text); }
    .search-wrap { display: grid; grid-template-columns: 1fr 70px; gap: 6px; }
    .filterbar {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 8px 12px;
      background: var(--filter);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .filterbar button.active { color: var(--green); border-color: var(--green); background: var(--go-bg); }
    .sort-wrap {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 230px;
      color: var(--secondary);
    }
    .sort-wrap select { width: 145px; }
    .tab-count { color: var(--secondary); }
    .review-ineligible {
      background: var(--amber-bg);
      color: var(--amber);
      border-color: var(--amber);
      font-size: 11px;
      white-space: nowrap;
    }
    .workflow {
      color: var(--secondary);
      border-bottom: 1px solid var(--border);
      padding: 7px 12px;
      background: #101012;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .main {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: calc(100vh - 92px);
    }
    .queue {
      background: var(--queue);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      max-height: calc(100vh - 92px);
    }
    .queue-empty { color: var(--muted); padding: 12px; }
    .queue-item {
      padding: 9px 10px;
      border-bottom: 1px solid #1b1b1f;
      border-left: 3px solid transparent;
      cursor: pointer;
    }
    .queue-item.active { border-left-color: var(--green); background: #111b14; }
    .queue-title {
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 5px;
    }
    .queue-meta { color: var(--secondary); display: flex; gap: 5px; flex-wrap: wrap; }
    .tag { border: 1px solid var(--border); padding: 1px 4px; color: var(--secondary); }
    .tag.high { color: var(--green); border-color: var(--green); }
    .tag.med { color: var(--amber); border-color: var(--amber); }
    .tag.low { color: var(--red); border-color: var(--red); }
    .eligibility-dot {
      width: 8px;
      height: 8px;
      display: inline-block;
      border-radius: 50%;
      border: 1px solid var(--border);
      margin-right: 2px;
    }
    .eligibility-dot.eligible_now { background: var(--green); border-color: var(--green); }
    .eligibility-dot.unrestricted { background: var(--secondary); border-color: var(--secondary); }
    .eligibility-dot.watch_list { background: var(--amber); border-color: var(--amber); }
    .eligibility-dot.ineligible_now { background: var(--red); border-color: var(--red); }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    .modal {
      width: min(560px, calc(100vw - 28px));
      border: 1px solid var(--amber);
      background: var(--card);
      padding: 14px;
      color: var(--text);
      box-shadow: 0 0 0 1px #000;
    }
    .modal h2 {
      color: var(--amber);
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin: 0 0 12px;
    }
    .modal pre {
      white-space: pre-wrap;
      color: var(--secondary);
      border: 1px solid var(--border);
      background: #101012;
      padding: 8px;
      max-height: 300px;
      overflow-y: auto;
    }
    .setaside-badge {
      display: inline-block;
      border: 1px solid var(--border);
      padding: 3px 6px;
      color: var(--secondary);
      background: #101012;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.3;
    }
    .setaside-badge.eligible {
      color: var(--green);
      border-color: var(--green);
      background: var(--go-bg);
    }
    .setaside-badge.caution {
      color: var(--amber);
      border-color: var(--amber);
      background: var(--amber-bg);
    }
    .setaside-badge.neutral {
      color: var(--secondary);
      border-color: var(--border);
    }
    .readiness-badge {
      display: inline-block;
      border: 1px solid var(--border);
      padding: 3px 6px;
      background: #101012;
      color: var(--secondary);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.3;
    }
    .readiness-badge.green {
      color: var(--green);
      border-color: var(--green);
      background: var(--go-bg);
    }
    .readiness-badge.cyan {
      color: var(--cyan);
      border-color: var(--cyan);
      background: #101b24;
    }
    .readiness-badge.amber {
      color: var(--amber);
      border-color: var(--amber);
      background: var(--amber-bg);
    }
    .readiness-badge.muted {
      color: var(--secondary);
      border-color: var(--border);
      background: #101012;
    }
    .readiness-helper {
      margin-top: 5px;
      color: var(--secondary);
      font-size: 11px;
      line-height: 1.35;
    }
    .copy-tools {
      margin-top: 9px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--secondary);
    }
    .card {
      background: var(--card);
      padding: 14px;
      overflow-y: auto;
      max-height: calc(100vh - 92px);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }
    .title { font-size: 14px; color: var(--text); line-height: 1.4; }
    .subtle { color: var(--secondary); }
    .muted { color: var(--muted); }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 8px;
      margin: 12px 0;
    }
    .meta {
      border: 1px solid var(--border);
      background: #111114;
      padding: 7px;
      min-height: 48px;
    }
    .label {
      display: block;
      color: #8fbcd4;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .value {
      color: #e8e8e8;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .section {
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .section h3 {
      margin: 0 0 8px;
      color: #b7d7e8;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .ribbon { display: flex; gap: 5px; flex-wrap: wrap; margin: 10px 0; }
    .stage {
      padding: 5px 7px;
      border: 1px solid var(--border);
      background: #111114;
      color: var(--muted);
    }
    .stage.current { color: var(--green); border-color: var(--green); background: var(--go-bg); }
    .stage.done { color: var(--secondary); border-color: #33513c; }
    .countdown.ok { color: var(--secondary); }
    .countdown.warn { color: var(--amber); }
    .countdown.danger { color: var(--red); }
    .disq {
      border: 1px solid var(--border);
      padding: 8px;
      margin-top: 10px;
    }
    .disq.HARD { border-color: var(--red); color: var(--red); background: #211010; }
    .disq.SOFT { border-color: var(--amber); color: var(--amber); background: var(--amber-bg); }
    .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .actions { display: flex; flex-wrap: wrap; gap: 7px; }
    .links { display: flex; flex-wrap: wrap; gap: 8px; }
    .checklist {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 6px;
    }
    .check {
      border: 1px solid var(--border);
      padding: 6px;
      color: var(--secondary);
    }
    .check.detected { color: var(--green); border-color: #25583d; }
    .upload-zone {
      border: 1px dashed var(--amber);
      background: var(--amber-bg);
      padding: 10px;
    }
    .note-row {
      border-top: 1px solid var(--border);
      padding: 7px 0;
    }
    .note-meta { color: var(--secondary); font-size: 10px; margin-bottom: 3px; }
    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
    .keyboard-legend {
      margin-top: 10px;
      color: #555555;
      font: 10px "Courier New", monospace;
      text-align: center;
    }
    .status-line {
      color: var(--secondary);
      min-height: 18px;
      margin-top: 8px;
    }
    .source-row {
      margin-top: 7px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--secondary);
    }
    .source-row .label {
      display: inline;
      margin: 0;
    }
    .source-row a {
      border: 1px solid var(--border);
      padding: 4px 7px;
      color: var(--cyan);
      background: #101012;
    }
    .desc-preview {
      color: #e8e8e8;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.45;
      margin-bottom: 8px;
    }
    .missing-desc {
      border: 1px solid var(--amber);
      background: var(--amber-bg);
      color: var(--amber);
      padding: 9px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.45;
    }
    .fetch-synopsis-btn {
      margin-top: 8px;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      background: transparent;
      font: 11px "Courier New", monospace;
      padding: 4px 12px;
    }
    .fetch-synopsis-status {
      margin-top: 7px;
      color: var(--secondary);
      font-size: 11px;
      line-height: 1.35;
    }
    .fetch-synopsis-status.error { color: var(--red); }
    details summary { cursor: pointer; color: var(--cyan); }
    pre.wrap {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: #101012;
      border: 1px solid var(--border);
      padding: 8px;
      color: var(--secondary);
      max-height: 240px;
      overflow-y: auto;
    }
    @media (max-width: 900px) {
      .topbar { grid-template-columns: 1fr; height: auto; }
      .main { grid-template-columns: 1fr; }
      .queue { max-height: 240px; border-right: 0; border-bottom: 1px solid var(--border); }
      .card { max-height: none; }
      .meta-grid, .columns, .checklist { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <div class="brand">GOVCON SCOUT // BID DESK</div>
      <div class="subtle" id="position">loading queue</div>
    </div>
    <div class="counts" id="counts"></div>
    <div class="search-wrap">
      <input id="search" placeholder="search notice, title, agency, notes...">
      <button id="resetSearch">RESET</button>
    </div>
  </div>
  <div class="filterbar" id="filters"></div>
  <div class="workflow">Review the job &rarr; Decide if doable/sourceable &rarr; Check requirements &rarr; Upload docs if needed &rarr; Run AI review &rarr; Get quote/intel &rarr; Draft/send response &rarr; Call/contact &rarr; Move to next</div>
  <div class="main">
    <aside class="queue" id="queue"></aside>
    <main class="card" id="card"></main>
  </div>

  <script>
    const FILTERS = ["Active", "Watch List", "Needs Docs", "AI Reviewed", "Sources Sought", "Flagged", "All", "Archive"];
    const FULL_STAGE = { Ready: "Ready to Submit" };
    const ACTIVE_STAGES = ["Triage", "Intake", "Manual Review", "AI Review", "Development", "Ready to Submit", "Execution"];
    const STAGE_ORDER = ["Triage", "Intake", "Manual Review", "AI Review", "Development", "Ready to Submit", "Execution", "Archive", "Done"];
    const ARCHIVE_TERMS = ["pass", "ignore", "poor fit", "duplicate", "already covered", "archive", "parked"];
    const UEI = "QJZTCE6MKBG5";
    const BUTTONS = {
      "Triage": ["YES — Intake Docs", "Manual Review", "PASS"],
      "Intake": ["Prepare SAM Docs", "Manual Upload", "Bypass to AI Review", "PASS"],
      "Manual Review": ["Advance to AI Review", "Advance to Development", "PASS"],
      "AI Review": ["Run AI Review", "Flag Disqualifier", "Advance to Development"],
      "Development": ["Log Vendor Quote", "Draft Response", "Mark Ready to Submit", "PASS"],
      "Ready to Submit": ["Mark Submitted", "Send Back to Development"],
      "Execution": ["Log Follow-Up", "Mark Done", "Park"],
      "Archive": ["Reactivate"],
      "Done": ["Reactivate"]
    };

    let opportunities = [];
    let config = {};
    let activeIndex = 0;
    let activeFilter = "Active";
    let sortMode = "Priority";
    let searchTerm = "";
    let statusMessage = "";

    const h = value => String(value ?? "").replace(/[&<>"']/g, ch => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[ch]));
    const val = value => h(value || "not available");
    const currentStage = row => row.macro_stage || "Triage";
    const noticeId = row => row.notice_id || "MyBidMatch";
    const stageFilterValue = f => FULL_STAGE[f] || f;
    const textOf = value => String(value || "").toLowerCase();
    const hasMeaningful = value => {
      const text = String(value || "").trim().toLowerCase();
      return !!text && !["not available", "none", "null", "n/a", "na"].includes(text);
    };
    const isFlagged = row => ["true", "yes", "1", "flagged"].includes(textOf(row.flagged));
    const containsAny = (value, terms) => terms.some(term => textOf(value).includes(term));
    const setAsideText = row => [row.set_aside, row.set_aside_type, row.set_aside_description].filter(hasMeaningful).join(" ");
    const setAsideEligibility = row => {
      const text = textOf(setAsideText(row));
      if (!text) return {
        bucket: "unrestricted",
        label: "unrestricted/unknown",
        tooltip: "Unrestricted or unknown"
      };
      if (text.includes("edwosb") || text.includes("economically disadvantaged woman-owned")) {
        return { bucket: "ineligible_now", label: "EDWOSB", tooltip: "Not currently prime eligible" };
      }
      if (text.includes("wosb") || text.includes("woman-owned") || text.includes("woman owned")) {
        return { bucket: "ineligible_now", label: "WOSB", tooltip: "Not currently prime eligible" };
      }
      if (text.includes("hubzone")) {
        return { bucket: "ineligible_now", label: "HUBZone", tooltip: "Not currently prime eligible" };
      }
      if (text.includes("8(a)") || /\b8a\b/.test(text)) {
        return { bucket: "ineligible_now", label: "8(a)", tooltip: "Not currently prime eligible" };
      }
      if (text.includes("sdvosb") || text.includes("service-disabled veteran-owned") || text.includes("service disabled veteran owned")) {
        return { bucket: "watch_list", label: "SDVOSB", tooltip: "Veteran set-aside — future certification path" };
      }
      if (text.includes("unrestricted") || text.includes("full and open")) {
        return { bucket: "unrestricted", label: "unrestricted", tooltip: "Unrestricted or unknown" };
      }
      if (text.includes("total small business") || text.includes("small business set-aside") || text === "sba" || (text.includes("small business") && !text.includes("woman") && !text.includes("veteran") && !text.includes("hubzone"))) {
        return { bucket: "eligible_now", label: "small business", tooltip: "Eligible/current pursuit set-aside" };
      }
      return { bucket: "unrestricted", label: "unrestricted/unknown", tooltip: "Unrestricted or unknown" };
    };
    const isArchivedStatus = row => {
      if (["Archive", "Done"].includes(currentStage(row))) return true;
      return containsAny(row.operator_status, ARCHIVE_TERMS)
        || containsAny(row.triage_status, ARCHIVE_TERMS)
        || containsAny(row.current_stage, ARCHIVE_TERMS);
    };
    const hasNoticeId = row => hasMeaningful(row.notice_id);
    const activeReview = row => {
      if (isFlagged(row)) return true;
      if (!hasNoticeId(row)) return false;
      if (isArchivedStatus(row)) return false;
      if (setAsideEligibility(row).bucket === "ineligible_now") return false;
      return ACTIVE_STAGES.includes(currentStage(row));
    };
    const notArchivedUnlessFlagged = row => isFlagged(row) || (!isArchivedStatus(row) && hasNoticeId(row));

    async function api(path, options = {}) {
      const response = await fetch(path, options);
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    async function load() {
      config = await api("/api/config");
      const data = await api("/api/opportunities");
      opportunities = data.opportunities || [];
      renderFilters();
      render();
    }

    function searchableText(row) {
      const notes = (row.notes || []).map(n => n.note_text).join(" ");
      const readiness = row.data_readiness || {};
      return [
        row.notice_id, row.title, row.agency, row.source, row.lane, row.naics,
        row.set_aside, readiness.value, readiness.tag, readiness.helper,
        row.macro_stage, row.current_stage, row.operator_status, row.triage_status,
        row.recommended_next_action, row.description, notes
      ].join(" ").toLowerCase();
    }

    function filterPredicate(name) {
      return row => {
        const ready = textOf(readiness(row).value);
        const sourceAvailable = !!sourceUrl(row);
        if (name === "All") return true;
        if (name === "Active") return activeReview(row);
        if (name === "Watch List") return ["ineligible_now", "watch_list"].includes(setAsideEligibility(row).bucket);
        if (name === "Flagged") return isFlagged(row);
        if (name === "Archive") return isArchivedStatus(row);
        if (name === "Needs Docs") {
          if (!notArchivedUnlessFlagged(row)) return false;
          return currentStage(row) === "Intake"
            || containsAny(row.operator_status, ["documents needed"])
            || containsAny(row.current_stage, ["documents needed"])
            || ready.includes("documents needed")
            || (ready.includes("metadata only") && sourceAvailable);
        }
        if (name === "AI Reviewed") {
          if (!notArchivedUnlessFlagged(row)) return false;
          return ready.includes("ai reviewed") || hasMeaningful(row.ai_summary) || hasMeaningful(row.requirements);
        }
        if (name === "Sources Sought") {
          if (!notArchivedUnlessFlagged(row)) return false;
          return containsAny(row.notice_type, ["sources sought", "rfi", "sources_sought"])
            || containsAny(row.solicitation_type, ["sources sought", "rfi", "sources_sought"])
            || hasMeaningful(row.sources_sought_status)
            || ready.includes("response plan ready");
        }
        return false;
      };
    }

    function filteredItems() {
      const predicate = filterPredicate(activeFilter);
      const items = opportunities.filter(row => {
        const filterOk = predicate(row);
        const searchOk = !searchTerm || searchableText(row).includes(searchTerm.toLowerCase());
        return filterOk && searchOk;
      });
      return sortItems(items);
    }

    function renderFilters() {
      const counts = filterCounts();
      document.getElementById("filters").innerHTML = `
        ${FILTERS.map(stage =>
          `<button class="${stage === activeFilter ? "active" : ""}" data-stage="${h(stage)}">${h(stage)} <span class="tab-count">(${counts[stage] || 0})</span></button>`
        ).join("")}
        <button class="review-ineligible" id="reviewIneligible">Review Ineligible Set-Asides</button>
        <div class="sort-wrap">
          <span class="label">SORT</span>
          <select id="sortMode">
            ${["Priority", "Due Date", "Recently Updated", "Stage"].map(option => `<option value="${h(option)}" ${option === sortMode ? "selected" : ""}>${h(option)}</option>`).join("")}
          </select>
        </div>`;
      document.querySelectorAll("#filters button").forEach(btn => {
        btn.onclick = () => {
          activeFilter = btn.dataset.stage;
          activeIndex = 0;
          renderFilters();
          render();
        };
      });
      const sort = document.getElementById("sortMode");
      if (sort) sort.onchange = event => {
        sortMode = event.target.value;
        activeIndex = 0;
        render();
      };
      const review = document.getElementById("reviewIneligible");
      if (review) review.onclick = showIneligibleReview;
    }

    function countBy(predicate) {
      return opportunities.filter(predicate).length;
    }

    function filterCounts() {
      return Object.fromEntries(FILTERS.map(name => [name, countBy(filterPredicate(name))]));
    }

    function parseDate(value) {
      if (!value) return null;
      const parsed = new Date(String(value).slice(0, 10) + "T00:00:00");
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function dueThisWeek(row) {
      if (!activeReview(row)) return false;
      const due = parseDate(row.due_date);
      if (!due) return false;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const days = Math.ceil((due - today) / 86400000);
      return days >= 0 && days <= 7;
    }

    function fitRank(row) {
      const band = textOf(row.fit_band);
      if (band.includes("high")) return 0;
      if (band.includes("med")) return 1;
      if (band.includes("low")) return 2;
      const score = Number(row.fit_score);
      if (!Number.isNaN(score)) {
        if (score >= 70) return 0;
        if (score >= 45) return 1;
        return 2;
      }
      return 3;
    }

    function dateValue(value, missingHigh = true) {
      const date = parseDate(value);
      if (date) return date.getTime();
      return missingHigh ? Number.MAX_SAFE_INTEGER : 0;
    }

    function updatedValue(value) {
      const date = value ? new Date(value) : null;
      return date && !Number.isNaN(date.getTime()) ? date.getTime() : 0;
    }

    function sortItems(items) {
      return [...items].sort((a, b) => {
        if (sortMode === "Due Date") return dateValue(a.due_date) - dateValue(b.due_date);
        if (sortMode === "Recently Updated") return updatedValue(b.last_updated) - updatedValue(a.last_updated);
        if (sortMode === "Stage") {
          const aStage = STAGE_ORDER.indexOf(currentStage(a));
          const bStage = STAGE_ORDER.indexOf(currentStage(b));
          return (aStage < 0 ? 99 : aStage) - (bStage < 0 ? 99 : bStage);
        }
        const flagged = Number(isFlagged(b)) - Number(isFlagged(a));
        if (flagged) return flagged;
        const fit = fitRank(a) - fitRank(b);
        if (fit) return fit;
        return dateValue(a.due_date) - dateValue(b.due_date);
      });
    }

    function renderCounts(items) {
      const tabCounts = filterCounts();
      const summary = [
        ["Active", tabCounts["Active"] || 0],
        ["Flagged", tabCounts["Flagged"] || 0],
        ["Due This Week", countBy(dueThisWeek)],
        ["Total", opportunities.length]
      ];
      document.getElementById("counts").innerHTML = summary.map(([k, v]) => `<span>${h(k)}: <b>${v}</b></span>`).join("");
      document.getElementById("position").textContent = items.length ? `${Math.min(activeIndex + 1, items.length)} / ${items.length}` : "0 / 0";
    }

    function renderQueue(items) {
      const queue = document.getElementById("queue");
      if (!items.length) {
        queue.innerHTML = `<div class="queue-empty">No matching opportunities found.</div>`;
        return;
      }
      queue.innerHTML = items.map((row, index) => {
        const band = String(row.fit_band || "").toLowerCase();
        const eligibility = setAsideEligibility(row);
        return `
          <div class="queue-item ${index === activeIndex ? "active" : ""}" data-index="${index}">
            <div class="queue-title">${h(row.title || row.notice_id || "untitled")}</div>
            <div class="queue-meta">
              <span class="eligibility-dot ${h(eligibility.bucket)}" title="${h(eligibility.tooltip)}"></span>
              <span class="tag" title="${h(eligibility.tooltip)}">${h(eligibility.label)}</span>
              <span class="tag ${band}">${h(row.fit_band || "NA")}</span>
              <span class="tag">${h(row.lane || "lane n/a")}</span>
              <span class="tag">${h(currentStage(row))}</span>
              <span class="tag">${h(readinessTag(row))}</span>
            </div>
          </div>`;
      }).join("");
      document.querySelectorAll(".queue-item").forEach(item => {
        item.onclick = () => {
          activeIndex = Number(item.dataset.index);
          render();
        };
      });
    }

    function ineligibleReviewText() {
      const typeCounts = {};
      let protectedCount = 0;
      for (const row of opportunities) {
        const eligibility = setAsideEligibility(row);
        if (!["ineligible_now", "watch_list"].includes(eligibility.bucket)) continue;
        const key = setAsideText(row) || eligibility.label;
        typeCounts[key] = (typeCounts[key] || 0) + 1;
        if (eligibility.bucket === "ineligible_now" && isFlagged(row)) protectedCount += 1;
      }
      const lines = ["Not currently prime-eligible:"];
      const entries = Object.entries(typeCounts).sort((a, b) => b[1] - a[1]);
      if (entries.length) {
        for (const [label, count] of entries) lines.push(`- ${label}: ${count}`);
      } else {
        lines.push("- none");
      }
      lines.push("");
      lines.push(`Flagged — protected from exclusion: ${protectedCount}`);
      lines.push("");
      lines.push("These opportunities are available in the Watch List tab.");
      lines.push("No changes have been made.");
      return lines.join("\n");
    }

    function showIneligibleReview() {
      const existing = document.getElementById("eligibilityModal");
      if (existing) existing.remove();
      const modal = document.createElement("div");
      modal.id = "eligibilityModal";
      modal.className = "modal-backdrop";
      modal.innerHTML = `
        <div class="modal" role="dialog" aria-modal="true">
          <h2>Set-Aside Eligibility Review</h2>
          <pre>${h(ineligibleReviewText())}</pre>
          <button class="warn" id="closeEligibilityModal">Close</button>
        </div>`;
      document.body.appendChild(modal);
      document.getElementById("closeEligibilityModal").onclick = () => modal.remove();
      modal.onclick = event => {
        if (event.target === modal) modal.remove();
      };
    }

    function countdown(row) {
      if (!row.due_date) return `<span class="countdown ok">deadline not available</span>`;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const due = new Date(row.due_date + "T00:00:00");
      const days = Math.ceil((due - today) / 86400000);
      const close = row.deadline_time ? ` | Closes ${h(row.deadline_time)} ${h(row.deadline_tz || "")}` : "";
      if (days < 0) return `<span class="countdown danger">Past due${close}</span>`;
      if (days <= 2) return `<span class="countdown danger">!! ${days} days remaining${close}</span>`;
      if (days <= 6) return `<span class="countdown warn">${days} days remaining${close}</span>`;
      return `<span class="countdown ok">${days} days remaining${close}</span>`;
    }

    function sourceUrl(row) {
      return row.source_url || row.ui_link || row.url || row.link || row.sam_url || row.notice_url || "";
    }

    function sourceLinkLabel(url) {
      return String(url || "").toLowerCase().includes("sam.gov") ? "View on SAM.gov" : "Open Source";
    }

    function renderSourceRow(row) {
      const url = sourceUrl(row);
      const source = row.source || "Source";
      if (url) {
        return `<div class="source-row"><span class="label">SOURCE</span><span>${h(source)}</span><a href="${h(url)}" target="_blank" rel="noopener">${sourceLinkLabel(url)}</a></div>`;
      }
      if (row.notice_id) {
        const searchUrl = `https://sam.gov/search/?keywords=${encodeURIComponent(row.notice_id)}`;
        return `<div class="source-row"><span class="label">SOURCE</span><span>${h(source)}</span><a href="${searchUrl}" target="_blank" rel="noopener">Search SAM.gov</a></div>`;
      }
      return `<div class="source-row"><span class="label">SOURCE</span><span>${h(source)}</span><span class="muted">source link not available</span></div>`;
    }

    function copyButton(label, value) {
      if (!value) return "";
      return `<button data-copy="${h(value)}">${h(label)}</button>`;
    }

    function setAsideDisplay(value) {
      return value || "not available";
    }

    function setAsideClass(value) {
      const text = String(value || "").toLowerCase();
      if (!text) return "neutral";
      if (text.includes("total small business") || text === "small business" || text.includes("small business set-aside")) return "eligible";
      if (text.includes("sdvosb") || text.includes("service-disabled") || text.includes("woman-owned") || text.includes("wosb") || text.includes("edwosb") || text.includes("hubzone") || text.includes("8(a)")) return "caution";
      return "neutral";
    }

    function renderSetAside(value) {
      return `<span class="setaside-badge ${setAsideClass(value)}">${h(setAsideDisplay(value))}</span>`;
    }

    function readiness(row) {
      return row.data_readiness || { value: "Metadata Only", style: "muted", tag: "metadata", helper: "Only scan metadata is available. Manual lookup may be required." };
    }

    function readinessTag(row) {
      return readiness(row).tag || readiness(row).value || "metadata";
    }

    function renderReadiness(row) {
      const state = readiness(row);
      const helper = state.helper ? `<div class="readiness-helper">${h(state.helper)}</div>` : "";
      return `<span class="readiness-badge ${h(state.style || "muted")}">${h(state.value || "Metadata Only")}</span>${helper}`;
    }

    function renderRibbon(stage) {
      const stages = config.stage_enums?.stages || [];
      const current = stages.indexOf(stage);
      return `<div class="ribbon">${stages.map((s, i) =>
        `<span class="stage ${s === stage ? "current" : i < current ? "done" : ""}">${h(s)}</span>`
      ).join("")}</div>`;
    }

    function splitList(value) {
      return String(value || "").split("|").map(v => v.trim()).filter(Boolean);
    }

    function renderList(value) {
      const items = splitList(value);
      return items.length ? `<ul>${items.map(item => `<li>${h(item)}</li>`).join("")}</ul>` : `<span class="muted">not available</span>`;
    }

    function renderDisqualifier(row) {
      const flag = row.disqualifier_flag || "NONE";
      if (flag === "NONE") return "";
      return `<div class="disq ${h(flag)}"><b>${h(flag)} DISQUALIFIER SIGNAL</b><br>${val(row.disqualifiers)}</div>`;
    }

    function renderChecklist(row) {
      return `<div class="checklist">${(row.document_checklist || []).map(item =>
        `<div class="check ${item.status === "detected" ? "detected" : ""}">
          <span class="label">${h(item.key)}</span>${h(item.status)}
        </div>`
      ).join("")}</div>`;
    }

    function fileUrl(path) {
      return `/file?path=${encodeURIComponent(path)}`;
    }

    function renderLinks(row) {
      const links = row.related_links || [];
      if (!links.length) return `<span class="muted">not available</span>`;
      return `<div class="links">${links.map(link =>
        `<a href="${fileUrl(link.path)}" target="_blank" rel="noopener">${h(link.label)}</a>`
      ).join("")}</div>`;
    }

    function descriptionText(row) {
      const values = [row.description, row.full_description, row.synopsis, row.notice_description, row.body, row.summary];
      for (const value of values) {
        const text = String(value || "").trim();
        if (!text) continue;
        if (["no", "yes", "none", "n/a", "na", "not available", "null"].includes(text.toLowerCase())) continue;
        return text;
      }
      return "";
    }

    function textEmpty(value) {
      const text = String(value || "").trim().toLowerCase();
      return !text || ["not available", "none", "null", "n/a", "na", "yes", "no"].includes(text);
    }

    function canFetchSynopsis(row) {
      const blockedTerms = ["pass", "archive", "ignore", "duplicate", "parked"];
      const statusText = [row.operator_status, row.triage_status, row.current_stage].join(" ").toLowerCase();
      const blocked = blockedTerms.some(term => statusText.includes(term));
      return textEmpty(row.synopsis)
        && textEmpty(row.description)
        && !!sourceUrl(row)
        && !["Archive", "Done"].includes(currentStage(row))
        && !blocked
        && !!row.notice_id;
    }

    function renderFetchSynopsis(row) {
      if (!canFetchSynopsis(row)) return "";
      return `
        <button class="fetch-synopsis-btn" id="fetchSynopsisBtn" data-notice-id="${h(row.notice_id)}">⟳ Fetch Synopsis</button>
        <div class="fetch-synopsis-status" id="fetchSynopsisStatus"></div>`;
    }

    function renderDescription(row) {
      const text = descriptionText(row).trim();
      if (!text) {
        const ready = readiness(row);
        const message = ["Metadata Only", "Documents Needed"].includes(ready.value)
          ? "⚠ No synopsis or local documents available yet. Use the source link above, Prepare SAM Docs, or upload documents manually before AI review."
          : "⚠ No description available — use source link above to view on SAM.gov/source portal or upload documents manually.";
        return `
          <div class="missing-desc">${h(message)}</div>
          ${renderFetchSynopsis(row)}
          <div class="section">
            <h3>Helpful Existing Links</h3>
            ${renderLinks(row)}
          </div>`;
      }
      const preview = text.length > 300 ? `${text.slice(0, 300)}...` : text;
      return `
        <div class="desc-preview">${h(preview)}</div>
        <details><summary>expand full description</summary><pre class="wrap">${h(text)}</pre></details>`;
    }

    function renderUpload(row) {
      const show = ["Intake", "Manual Review"].includes(currentStage(row)) || row.operator_status === "documents_needed";
      if (!show) return "";
      return `
        <div class="section upload-zone">
          <h3>Manual Upload</h3>
          <input type="file" id="uploadFile">
          <button class="warn" id="uploadBtn">Upload Document</button>
        </div>`;
    }

    function renderNotes(row) {
      const notes = row.notes || [];
      return `
        <div class="section">
          <h3>Notes / Activity</h3>
          <div class="columns">
            <div>
              <select id="noteType">${(config.stage_enums?.note_types || []).map(type => `<option value="${h(type)}">${h(type)}</option>`).join("")}</select>
              <textarea id="noteText" placeholder="Add operator note..."></textarea>
              <button id="saveNote" class="go">Save Note</button>
            </div>
            <div>
              ${notes.length ? notes.map(note => `
                <div class="note-row">
                  <div class="note-meta">${h(note.timestamp)} | ${h(note.note_type)} | ${h(note.stage)}</div>
                  <div>${h(note.note_text)}</div>
                </div>`).join("") : `<span class="muted">No notes yet.</span>`}
            </div>
          </div>
        </div>`;
    }

    function actionButtons(row) {
      const stage = currentStage(row);
      return (BUTTONS[stage] || []).map(label => {
        const klass = label.includes("PASS") || label.includes("Disqualifier") ? "risk" :
          label.includes("Manual") || label.includes("Park") || label.includes("Back") ? "warn" : "go";
        return `<button class="${klass}" data-action-label="${h(label)}">${h(label)}</button>`;
      }).join("");
    }

    function renderCard(row, items) {
      if (!row) {
        document.getElementById("card").innerHTML = `<div class="muted">No matching opportunities found.</div>`;
        return;
      }
      document.getElementById("card").innerHTML = `
        <div class="card-header">
          <div>
            <div class="title">${h(row.title || "untitled opportunity")}</div>
            <div class="subtle">${h(row.source || "source n/a")} | ${h(noticeId(row))}</div>
            ${renderSourceRow(row)}
          </div>
          <div>
            <span class="tag ${String(row.fit_band || "").toLowerCase()}">${h(row.fit_band || "NA")}</span>
            <span class="tag">${h(row.priority || "priority n/a")}</span>
          </div>
        </div>

        <div class="meta-grid">
          <div class="meta"><span class="label">Agency</span><span class="value">${val(row.agency)}</span></div>
          <div class="meta"><span class="label">Notice / Lead ID</span><span class="value">${val(noticeId(row))}</span>${copyButton("copy", row.notice_id)}</div>
          <div class="meta"><span class="label">Due</span><span class="value">${countdown(row)}</span></div>
          <div class="meta"><span class="label">NAICS / Lane</span><span class="value">${val(row.naics)} / ${val(row.lane)}</span>${copyButton("copy NAICS", row.naics)}</div>
          <div class="meta"><span class="label">Place of Performance</span><span class="value">${val(row.place_of_performance)}</span></div>
          <div class="meta"><span class="label">Set-Aside</span><span class="value">${renderSetAside(row.set_aside)}</span></div>
          <div class="meta"><span class="label">Data Readiness</span><span class="value">${renderReadiness(row)}</span></div>
          <div class="meta"><span class="label">Buyer Email</span><span class="value">${val(row.buyer_email)}</span>${copyButton("copy email", row.buyer_email)}</div>
          <div class="meta"><span class="label">Operator Status</span><span class="value">${val(row.operator_status)}</span></div>
          <div class="meta"><span class="label">Recommended Next Action</span><span class="value">${val(row.recommended_next_action)}</span></div>
        </div>

        ${renderRibbon(currentStage(row))}
        ${renderDisqualifier(row)}

        <div class="section">
          <h3>AI / Plain-English Summary</h3>
          <div>${val(row.ai_summary || row.recommended_next_action)}</div>
        </div>

        <div class="section columns">
          <div>
            <h3>Requirements</h3>
            ${renderList(row.requirements)}
          </div>
          <div>
            <h3>Disqualifiers</h3>
            ${renderList(row.disqualifiers)}
          </div>
        </div>

        <div class="section">
          <h3>Full Description</h3>
          <div id="descriptionContent">${renderDescription(row)}</div>
        </div>

        <div class="section">
          <h3>Buyer / Follow-Up</h3>
          <div class="meta-grid">
            <div class="meta"><span class="label">Buyer</span>${val(row.buyer_name)}</div>
            <div class="meta"><span class="label">Phone</span>${val(row.buyer_phone)}</div>
            <div class="meta"><span class="label">Last Call</span>${val(row.last_call_date)}</div>
            <div class="meta"><span class="label">Last Call Notes</span>${val(row.last_call_notes)}</div>
          </div>
        </div>

        <div class="section">
          <h3>Stage Actions</h3>
          <div class="actions">${actionButtons(row)}</div>
          <div class="status-line" id="statusLine">${h(statusMessage)}</div>
        </div>

        ${renderUpload(row)}

        <div class="section">
          <h3>Document Checklist</h3>
          ${renderChecklist(row)}
        </div>

        <div class="section">
          <h3>Related Outputs</h3>
          ${renderLinks(row)}
          <div class="copy-tools"><span class="label">Copy Tools</span><span>${UEI}</span>${copyButton("copy UEI", UEI)}</div>
        </div>

        ${renderNotes(row)}

        <div class="nav-row">
          <button id="prevBtn">Previous</button>
          <span class="subtle">${activeIndex + 1} / ${items.length}</span>
          <button id="nextBtn">Next</button>
        </div>
        <div class="keyboard-legend">J next · K prev · N pass · H hold · U pursue · S synopsis · / search</div>
      `;
      wireCardEvents(row, items);
    }

    function flashStatus(message, ms = 1000) {
      statusMessage = message;
      const line = document.getElementById("statusLine");
      if (line) line.textContent = message;
      setTimeout(() => {
        if (statusMessage === message) {
          statusMessage = "";
          const currentLine = document.getElementById("statusLine");
          if (currentLine) currentLine.textContent = "";
        }
      }, ms);
    }

    async function fetchSynopsis(row) {
      const button = document.getElementById("fetchSynopsisBtn");
      const status = document.getElementById("fetchSynopsisStatus");
      if (!button || !status) return;
      button.disabled = true;
      button.textContent = "⟳ Fetching...";
      status.className = "fetch-synopsis-status";
      status.textContent = "";
      try {
        const result = await api("/api/fetch-synopsis", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ notice_id: row.notice_id })
        });
        if (result.status === "ok" && result.synopsis) {
          row.description = result.synopsis;
          row.synopsis = result.synopsis;
          const container = document.getElementById("descriptionContent");
          if (container) container.innerHTML = renderDescription(row);
          return;
        }
        if (result.status === "empty") {
          status.textContent = "SAM returned no description for this notice — try uploading documents manually or use the source link above";
          button.disabled = false;
          button.textContent = "⟳ Fetch Synopsis";
          return;
        }
        status.className = "fetch-synopsis-status error";
        status.textContent = result.message && result.message.includes("SAM API key")
          ? "SAM API key not configured — check .env file"
          : "API error — check terminal output and try again";
        button.disabled = false;
        button.textContent = "⟳ Fetch Synopsis";
      } catch (error) {
        status.className = "fetch-synopsis-status error";
        status.textContent = "API error — check terminal output and try again";
        button.disabled = false;
        button.textContent = "⟳ Fetch Synopsis";
      }
    }

    function render() {
      const items = filteredItems();
      if (activeIndex >= items.length) activeIndex = Math.max(0, items.length - 1);
      renderCounts(items);
      renderQueue(items);
      renderCard(items[activeIndex], items);
    }

    async function updateStage(row, stage, noteType, noteText, operatorStatus = "", lastAction = "") {
      const payload = {
        notice_id: row.notice_id,
        macro_stage: stage,
        note_type: noteType || "general_note",
        note_text: noteText || "",
        operator_status: operatorStatus,
        last_operator_action: lastAction || `Moved to ${stage}`
      };
      await api("/api/stage", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      statusMessage = `Updated: ${stage}`;
      await load();
    }

    async function saveNote(row, type, text) {
      await api("/api/note", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ notice_id: row.notice_id, note_type: type, note_text: text, stage: currentStage(row) })
      });
      statusMessage = "Note saved.";
      await load();
    }

    async function runAction(row, action) {
      statusMessage = `Running ${action}...`;
      render();
      const result = await api(`/api/action/${action}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ notice_id: row.notice_id })
      });
      statusMessage = result.message || result.status || "Action complete.";
      await load();
    }

    async function handleButton(row, label) {
      if (!row.notice_id) {
        statusMessage = "Missing notice_id; cannot update this card.";
        render();
        return;
      }
      if (label === "YES — Intake Docs") {
        const note = prompt("Decision note (optional):") || "";
        return updateStage(row, "Intake", "general_note", note, "", "Moved to Intake.");
      }
      if (label === "Manual Review") {
        const note = prompt("What needs checking?");
        if (note === null) return;
        return updateStage(row, "Manual Review", "risk_note", note, "", "Moved to Manual Review.");
      }
      if (label === "PASS") {
        const note = prompt("Why are you passing?");
        if (!note) return;
        return updateStage(row, "Archive", "risk_note", note, "pass", "Passed/archived by operator.");
      }
      if (label === "Prepare SAM Docs") return runAction(row, "prepare_docs");
      if (label === "Manual Upload") {
        const input = document.getElementById("uploadFile");
        if (input) input.focus();
        statusMessage = "Use the upload zone below.";
        return render();
      }
      if (label === "Bypass to AI Review") {
        return updateStage(row, "AI Review", "general_note", "Operator bypassed intake to AI Review.", "", "Bypassed to AI Review.");
      }
      if (label === "Advance to AI Review") return updateStage(row, "AI Review", "general_note", "", "", "Advanced to AI Review.");
      if (label === "Advance to Development") return updateStage(row, "Development", "general_note", "", "", "Advanced to Development.");
      if (label === "Run AI Review") return runAction(row, "run_ai_review");
      if (label === "Flag Disqualifier") {
        const note = prompt("What is the disqualifier?");
        if (!note) return;
        return updateStage(row, "Archive", "risk_note", note, "disqualified", "Flagged hard disqualifier.");
      }
      if (label === "Log Vendor Quote") {
        const note = prompt("What quote is needed and from whom?");
        if (!note) return;
        return saveNote(row, "vendor_quote_note", note);
      }
      if (label === "Draft Response") return runAction(row, "draft_response");
      if (label === "Mark Ready to Submit") return updateStage(row, "Ready to Submit", "general_note", "", "", "Marked ready to submit.");
      if (label === "Mark Submitted") {
        const note = prompt("What was submitted and to whom?");
        if (!note) return;
        return updateStage(row, "Execution", "submission_note", note, "submitted", "Marked submitted.");
      }
      if (label === "Send Back to Development") return updateStage(row, "Development", "general_note", "", "", "Sent back to Development.");
      if (label === "Log Follow-Up") {
        const note = prompt("Follow up when and why?");
        if (!note) return;
        return saveNote(row, "follow_up_note", note);
      }
      if (label === "Mark Done") return updateStage(row, "Done", "general_note", "", "done", "Marked done.");
      if (label === "Park") {
        const note = prompt("Park note (optional):") || "";
        return updateStage(row, "Archive", "general_note", note, "parked", "Parked by operator.");
      }
      if (label === "Reactivate") {
        const choice = prompt("Reactivate to which stage? Type Triage or Manual Review.", "Triage") || "Triage";
        const stage = choice === "Manual Review" ? "Manual Review" : "Triage";
        return updateStage(row, stage, "general_note", `Reactivated to ${stage}.`, "", "Reactivated.");
      }
    }

    function toggleHold(row) {
      row.flagged = isFlagged(row) ? "" : "true";
      statusMessage = isFlagged(row) ? "Held / flagged for review." : "Hold removed.";
      renderFilters();
      render();
    }

    function shortcutFetchSynopsis(row) {
      const button = document.getElementById("fetchSynopsisBtn");
      if (button) {
        button.click();
        return;
      }
      if (descriptionText(row).trim()) {
        flashStatus("Synopsis already loaded");
        return;
      }
      if (!sourceUrl(row)) {
        flashStatus("No source URL — cannot fetch synopsis");
      }
    }

    function wireCardEvents(row, items) {
      document.querySelectorAll("[data-copy]").forEach(btn => {
        btn.onclick = async () => {
          await navigator.clipboard.writeText(btn.dataset.copy);
          btn.textContent = "copied";
          setTimeout(() => { btn.textContent = "copy"; }, 900);
        };
      });
      document.querySelectorAll("[data-action-label]").forEach(btn => {
        btn.onclick = () => handleButton(row, btn.dataset.actionLabel);
      });
      const fetchButton = document.getElementById("fetchSynopsisBtn");
      if (fetchButton) fetchButton.onclick = () => fetchSynopsis(row);
      const prev = document.getElementById("prevBtn");
      const next = document.getElementById("nextBtn");
      if (prev) prev.onclick = () => { activeIndex = Math.max(0, activeIndex - 1); render(); };
      if (next) next.onclick = () => { activeIndex = Math.min(items.length - 1, activeIndex + 1); render(); };
      const save = document.getElementById("saveNote");
      if (save) save.onclick = () => {
        const type = document.getElementById("noteType").value;
        const text = document.getElementById("noteText").value.trim();
        if (!text) return;
        saveNote(row, type, text);
      };
      const uploadBtn = document.getElementById("uploadBtn");
      if (uploadBtn) uploadBtn.onclick = async () => {
        const file = document.getElementById("uploadFile").files[0];
        if (!file) {
          statusMessage = "Choose a file first.";
          render();
          return;
        }
        const form = new FormData();
        form.append("file", file);
        const result = await fetch(`/api/upload/${encodeURIComponent(row.notice_id)}`, { method: "POST", body: form });
        const data = await result.json();
        statusMessage = data.error || `Uploaded ${file.name}; moved to AI Review.`;
        await load();
      };
    }

    document.getElementById("search").addEventListener("input", event => {
      searchTerm = event.target.value;
      activeIndex = 0;
      render();
    });
    document.getElementById("resetSearch").onclick = () => {
      searchTerm = "";
      document.getElementById("search").value = "";
      activeIndex = 0;
      render();
    };

    document.addEventListener("keydown", event => {
      const target = event.target;
      const typing = ["INPUT", "TEXTAREA", "SELECT"].includes(target.tagName);
      if (event.key === "/" && !typing) {
        event.preventDefault();
        document.getElementById("search").focus();
        return;
      }
      if (typing) return;
      const items = filteredItems();
      const row = items[activeIndex];
      if (!row) return;
      if (event.key.toLowerCase() === "j") {
        activeIndex = Math.min(items.length - 1, activeIndex + 1);
        render();
      } else if (event.key.toLowerCase() === "k") {
        activeIndex = Math.max(0, activeIndex - 1);
        render();
      } else if (event.key.toLowerCase() === "n") {
        handleButton(row, "PASS");
      } else if (event.key.toLowerCase() === "h") {
        toggleHold(row);
      } else if (event.key.toLowerCase() === "u" && currentStage(row) === "Triage") {
        handleButton(row, "YES — Intake Docs");
      } else if (event.key.toLowerCase() === "s") {
        shortcutFetchSynopsis(row);
      } else if (event.key === "Enter") {
        const note = document.getElementById("noteText");
        if (note) note.focus();
      }
    });

    load().catch(error => {
      document.getElementById("card").innerHTML = `<div class="disq HARD">Dashboard failed: ${h(error.message)}</div>`;
    });
  </script>
</body>
</html>
